id: "ai-content-creation"
title: "我弃掉了那个最完美的选题"
date: "2026-06-15"
summary: "有一天晚上，AI给我列了三十多个选题，其中一个看起来特别完美。"
tags: ["AI","观察"]
category: "ai"
lang: "zh"
---
有一天晚上，我用AI工具列了三十多个选题方向。

其中有一个看起来特别完美，标题对仗、角度新颖、逻辑自洽，甚至连开头都替我想好了。我盯着它看了五分钟，总觉得哪里不对。说不出来哪里不对，但就是不想写。

最后还是弃了。

用AI工具辅助做选题优化差不多一年了。这一年的感受可以用两个字概括：分裂。一方面我确实已经离不开它，另一方面我又时刻在提醒自己不要被它驯化。

过去做一个深度内容的选题，我可能需要花一整个上午去发散、查资料、筛角度，再和人讨论。现在我用AI做第一步的发散，同一时间能得到几十个备选方向，然后再花主要精力做判断、做深度加工。这种工作流的改变，不是更快地写完一篇文章，而是把人的判断力前置了，让模型负责信息的广度，我来负责洞察的深度。

但问题也随之而来。选题优化被极度提效之后，内容生产的温度变得特别容易流失。AI生成的建议通常逻辑正确、结构工整、看起来什么都说了，但就是缺一种人味，那种基于个人经历的不完美视角，或者某种只有特定语境下才会出现的表达方式。这种温度一旦被抹平，内容就会变成流水线上的标准件，读者是能感觉出来的。

扔掉那个完美选题的那天晚上，我想明白了一件事：AI给我的方向越完美，我越要警惕。因为完美的东西往往是平均的，而真正好的选题，一定带着某个人的偏执和盲区。

这半年我一直在找一个平衡点。有几个做法我觉得比较有效。

AI是找选题的陪练，不是定选题的老师。我会大量地让它列出方向，但最终选哪个，一定是基于我自己的经验、判断，甚至是一瞬间的直觉。就像那天晚上那三十多个方向，AI列得很好，但真正想写的那个，是第二天早上洗澡的时候突然冒出来的。

AI生成的文字我会读，但不会直接贴。我会重新用自己说话的方式去写一遍，哪怕结构没那么规整。

有时候我会故意给自己制造一些摩擦。完全抛开AI，用最笨的办法去翻书、去手写大纲，只为了保持那种把脑袋想疼的感觉。这听起来低效，却是在保护创作中人的温度。

《品牌相关性》里其实也提到，人们之所以和某些品牌产生强烈连接，往往不是因为它们更正确，而是因为它们更像一个人。内容创作也是这样。AI可以让我们变得更高效、更周全，但它不能替代那个我为什么这么想的动机，也不能替代那些不完美但真挚的表达。

现在我更愿意把AI工具当成一个放大器，而不是替代品。它让我有更多时间去做真正重要的事：观察、思考、感受，然后把那些只属于人的温度放进每一个选题里。

那天晚上扔掉的那个选题，后来在另一个语境下，变成了你现在读到的这篇。
`,uk=`---
id: "bar-experiment"
title: "装修第八十三天，我盯着账单说不出话"
date: "2026-07-06"
summary: "水管走线多了一千八，老周在旁边抽完烟，扔掉烟蒂一脚踩灭。"
tags: ["创业","品牌"]
category: "brand"
lang: "zh"
---
装修第八十三天，长沙下着雨。我蹲在毛坯房里盯着报价单，水管走线多了一千八，灯光返工加三千，吧台那块老榆木比预算贵了将近一倍。合伙人老周在旁边抽烟，一脚踩灭烟头。我俩都没说话。那是2025年9月，距开业还有三个月。

我在广州做了十年品牌，2025年回长沙。白天上班，晚上去酒吧坐着，慢慢想自己开一个。葡滋，2025年12月在长沙河西开的，我是联合创始人。联合两个字，意思就是拍板的是老周，他出钱我出脑子。

选铺面跑了十几个地方，五一广场房租能把人吃掉，梅溪湖太新，洋湖太远。最后定在保利山姆楼上，楼下是山姆会员店，楼上是商业空间。那天是周末，山姆门口排队排到了马路边，购物车挤成一团。老周站在楼上往下看，说这个流量能沾上一点就行。我也觉得能沾上。这个判断后来被证明是我整件事里最大的一个错，但那天我们俩都很兴奋。

办证是另一座山。每张纸背后都是一个窗口，我在政务中心排了一天，办完两个章。柜台后面的大姐问我，你们这种小酒吧能活过一年吗。我说试试看。我做了十年品牌，那天发现品牌两个字在柜台前一个都用不上，人家不认PPT。

定酒单是我最熟的部分。左边经典款八款，右边十款我起名“城市灵感系列”。头一版写太满，调酒师阿杰看完说，哥，客人喝酒不想读作文。删到每款只剩一句话。“暗恋桃子”，藏在白桃香气里的青涩心动。“半醉长沙”，献给星城打工人的体面微醺。阿杰试了三版才把“湘女多情”调对，朗姆配椰奶，多了腻少了薄。

阿杰后来走了，女朋友要去深圳，跟着走的。临走前一晚我们在吧台喝完最后一杯“冷萃夜色”，他说这杯酒是给白天上班晚上做梦的人准备的，他也准备换个地方做梦。我没留他。开酒吧这种事，我后来才发现人比钱散得早。

新调酒师叫小唐，二十三岁，手稳但不懂长沙。我带他去岳麓山走了一圈，五月清晨有薄雾，草木是潮的。他回来调出“五月岳麓山”，灰蒙蒙的紫。“爱晚亭的晚风”也是他调的，他尝了一口说，这风是凉的。我没告诉他我当时也想这么说。

菜单是另一摊事。老周想做纯西餐，我说长沙人半夜不会想吃牛排。最后定了融合路线，暹罗酸辣脆皮鸡是招牌，湘西的山胡椒麻辣牛肉条一上桌木姜子油的味道满屋子都是。

开业那天是2025年12月12号。晚上八点店里坐了三桌，我站在吧台后面切柠檬，手一直在抖。十一点吧台满了。有个女孩点了一杯“暗恋桃子”，喝完问我这酒有故事吗。我说有，是没说出口的那种。她笑了一下，说我也有一段。那晚收摊凌晨两点，流水不到三千，老周算了半天没说话。

没有往上走。开业第二周开始，工作日的晚上经常只有两三桌。楼下山姆的人流确实大，可他们推着满满的购物车出来，直奔停车场，没有人抬头看一眼楼上还有个酒吧。有次我站在窗前往下看，一个拎着两箱牛奶的大哥走出来，连脚步都没慢。老周说也许周末会好。多几桌，但都是美团搜来喝完就走的。我原来以为山姆的流量能自然溢到楼上来，开业以后才知道，山姆的人和酒吧的人不是同一拨。

算到现在，葡滋开了七个月。老周还在算账，小唐还在调酒。坐2号线转6号线去店里，五十分钟够过一遍备货。上个月有个客人连来四天，每天同一杯“爱晚亭的晚风”，第四天问酒名字谁起的。我说我。他说，挺好的。

那天晚上他走以后，店里就空了。小唐在擦吧台，空调嗡嗡响。我坐在吧台最里面，面前一杯没喝完的水。楼下山姆的灯还亮着，停车场还有车在往外走。
`,ck=`---
id: "brand-trust"
title: "楼下那家没有招牌的面馆"
date: "2026-05-20"
summary: "客户问我能不能快一点出效果，我没有直接回答。"
tags: ["阅读","品牌"]
category: "brand"
lang: "zh"
---
去年有个朋友问我："能不能快一点出效果？"

他想要的是更快地增长。更精准的投放，更巧妙的定位，更爆的内容。我理解他的焦虑，账上的钱在烧，市场窗口在关，每多等一个月，团队就多一个月的压力。

但我当时没有直接回答他，而是问了一个问题："你上一次买一个新东西，是因为看了广告，还是因为朋友推荐？"

他想了想说，好像都是朋友推荐。

那段时间我一直在断断续续翻 David Aaker 的《品牌相关性》。这本书本身并不新，但放在当下的环境里反而更有味道。Aaker讲的表面上是"创造新品类、避开红海竞争"，但越读越觉得，他真正在说的是一个更底层的东西：品牌增长靠的是信任在不断被验证和累积。

我自己做品牌策略的时候，会反复碰到那个朋友式的矛盾，所有人都想要"更快地增长"，但品牌真正能跨越周期的能量，往往是"慢"出来的。我们以为增长来自某个爆款内容、一次精准投放或者一个巧妙定位，但把这些动作拆开来看，它们真正起效的前提，是受众在此之前就已经对这个品牌有了一种隐性的信任。

Aaker书里有一个点我特别认同：品牌之所以能建立相关性，不只是因为"我出现了"，而是因为"我一直在兑现承诺"。很多品类创新的品牌不是靠一次亮相就赢得市场的，而是用持续的产品力和一致的体验，在用户心里慢慢把自己和某个需求画上等号。这种"画等号"的过程，就是信任在积累，我信你的产品能解决我的问题，我信你不会让我失望。

那个朋友后来按自己的节奏做了。三个月后他跟我说，有一批老用户开始主动帮他转介绍了。他没有做特别的裂变活动，只是那三个月里，每一次交付都做到了他承诺的标准。

很多品牌死在体验没跟上的时候，流量进来了，交付没到位，信任断裂，增长立刻变成泡沫。而那些活得久的品牌，几乎无一例外，都是在某个很小的切面上反复用行动加固信任。我自己网站上那些长期打磨的作品，单看每一个项目似乎都不是"爆款"，但它们是持续建立"这个人靠谱"的信号。

流量决定能走多快。但能走多远，得看信任。

Aaker的方法论，找到新的竞争维度、定义子品类，本质上是为了给信任积累提供一个更清晰的容器。品类创新降低了用户的选择成本，但真正让用户留下来的，是你一次又一次没有辜负他们的期待。

这也让我对"做品牌"这件事更有耐心了。与其追逐一波又一波的流量技巧，不如回头看看，今天的每一个触达动作，是不是在为长期的信任账户里存钱。

那天和朋友聊完，我走出他办公室。楼下是一家开了十几年的老面馆，门口排着队。没有招牌，没有营销，就是一锅汤熬了十几年。排队的人里有附近的住户，也有专门开车来的。

我排了十分钟，要了一碗。确实好。

title: "手心出汗的第一天"

---
2022年10月，广州。共享空间里的一张桌子，月租一千出头，桌面只够放一台笔记本和一个杯子。窗外是天河的高楼，下午的时候阳光斜进来，在桌角留一条亮边。这是我给企鹅探学开的第一场筹备会，算上我三个人。

共享空间里总有人走动。咖啡机在响，有人在打电话，椅子腿蹭着地板，声音混在一起。我把笔记本转给对面两个人看，上面是我在Notion里搭的活动框架，一页一页连着，像一张网。其中一个人是原来做过研学的老师，她看了看说，框架挺清楚，但第一场活动你得想清楚带谁去、去哪、干什么。我点头，手心有点出汗。

第一天总是这样。你手里有个想法，但想法是软的、模糊的、自己都说不清楚的，你得把它做成一个别人愿意走进来的地方。从零到一这一步，说起来几个节点，做起来就是手心一直在出汗。

2025年4月，长沙。换了个城市，换了张桌子，这回是在新公司的工位上。公司刚租下一层，工位还是新的，椅子转起来有点涩。我接的活是30天搭一套品牌体系。

我在工位上打开Notion，开始建文档。第一个叫品牌定位，第二个叫视觉系统，第三个叫内容框架，一个一个建下去，建到第十几个的时候，文档之间的链接开始能串起来。Notion的好处是能像搭积木一样，把一个概念拆成几块，再拼回去。我在屏幕上拖来拖去，挪一个板块，整个结构跟着动。

那阵子我常改文案改到很晚。长沙的春天湿，晚上工位上凉，我把外套搭在椅背上。改文案这事，在屏幕上和纸上一样费劲，有时候为一个标题卡半小时。但用Notion的好处是，改完一刷新，所有人都能看到最新版本，不用再发文件、对版本。有一次我改到凌晨两点，电梯已经停了，我走楼梯下去，楼道里声控灯一盏一盏亮起来又一盏一盏灭掉。

走到一半回头看，那些文档已经从一堆零散的想法，长成了一个能让人走进去的地方。定位是门口，往里走，墙和灯归视觉系统管，再往里，内容框架定的是房间里摆的东西。从零到一就是把模糊的弄清楚，把散的拢到一起，让路过的人愿意停下来走进去。

2025年12月，还是长沙。葡滋酒吧，我成了联合创始人。合伙人姓周，比我大几岁，做餐饮做了十几年。我们在一张餐巾纸上画了菜单的初版，周哥的字写得比我好。酒吧那个地段晚上人多，窗外有人排队买奶茶，声控灯一直亮着。

葡滋从零到一，又把那几个节点走了一遍。每一个节点的第一天，我都手心出汗。在企鹅探学那张共享空间的桌子上是那样，在新公司的工位上也是那样。

周哥那天问我，你怎么每次开头都紧张。我说不知道，可能是怕做出来的东西没人愿意走进来。他笑了一下，没说话，把杯子擦了擦放下。

窗外的排队散了，奶茶店关了门。声控灯又灭了一盏。

id: "brand0-1"
title: "灯关了大半，台灯还亮着"
date: "2026-06-22"
summary: "入职第一天，老板让我三十天搭出一套品牌体系。"
tags: ["品牌","方法论"]
category: "brand"
lang: "zh"
---
入职第一天，老板给了我一个任务：一个月内，把"晓A精灵"这个AI英语教培品牌的整套体系做出来。

定位、视觉、手册、官网、发布会，全要。

我当时坐在工位上，盯着这句话看了很久。三十天完成品牌定位、视觉体系、官网、发布会。时间短，人手少，要求高。我当时心想，好家伙。

第三天晚上，我对着一堆竞品资料和用户反馈，卡住了。

过去两天我一直在想"我们要做什么"，AI教学、智能辅导、个性化学习，方向列了一堆，每个看起来都对，但每个也都模糊。那天晚上我把所有方向写在白板上，盯着看了半个小时，突然意识到问题出在哪：我一直在加东西，没有减。

第二天我换了个思路，不去想"做什么"，去想"不做什么"。

我和创始人连续聊了一周，每天一小时，把过去积累的用户反馈、竞品资料全部过了一遍。聊到第四天的时候，他说了一句话，"其实家长选我们，不是因为我们AI教得好，是因为孩子来了之后开始主动说英语了。"

这句话一下点醒了我。这个品牌的核心不是"AI教学"，是"让孩子爱上学习"。这个认知差，就是品牌定位的起点。最终我们的定位是：精准发音，全球对话，你的AI英语专家。slogan是"发音要准，进步要狠，未来要稳"。

定位定了之后，剩下的事情反而快了。

品牌手册我做了两版。一版完整版，给设计团队和外部供应商用，该有的都有。另一版精简版，给销售、市场、运营看，只有10页，每页都在回答同一个问题："我该怎么用这套品牌？"很多品牌手册做完后除了设计师没人看得懂，我觉得那是浪费资源。

官网只做了三个页面：首页、产品介绍、品牌故事。交互逻辑我自己做原型，设计只负责视觉执行。不追求完美，追求"能上线、能看懂"。品牌专属的九阶成长体系和对应的学习要求也定了下来。

发布会全案是我自己写的，从创意策划到视觉系统，再到创始人的核心演讲模块。核心就一件事：把"品牌是什么"讲清楚，把"优势是什么"说明白。不堆PPT。

三十天后我们上线了。品牌体系不算完美，但它跑起来了。整个团队从"不知道怎么介绍自己"变成了"每个人都能说清楚我们是谁"。

发布会结束那晚，我一个人坐在办公室里。灯关了大半，只有工位上的台灯还亮着。桌面上散着白板笔、品牌手册的打印稿、一杯凉了的咖啡。

累吗？累。但那三十天其实是在帮我自己理清一件事：一个品牌的核心，不是logo，不是颜色，是一套完整的认知体系。知道什么该做，什么不该做。这个道理我当时说不清楚，但现在回头看，那三十天里每一个卡壳的时刻，都在替我回答这个问题。

date: "2026-07-10"
summary: "2号线转6号线，单程四十分钟，我靠着铁柱子数工卡。"

---
长沙早高峰，2号线转6号线，单程四十分钟。我每天七点四十进站，车厢挤得转不开身，有人低头刷手机，有人闭着眼靠在车门上。我习惯站在车厢连接处，手扶着那根冰凉的杆子。这四十分钟一般放空，但偶尔脑子自己转起来，转到某个做决定的瞬间。

2022年初，还在易车。有天下午在广州TIT创意园的工位上，收到猎头消息，太平洋汽车在招人。我没马上回。易车是大厂，活儿顺，福利好，下午阳光从窗户斜进来照在键盘上。太平洋汽车也是大厂，但那个岗位接手的是一摊烂数据，进去得自己理。下班走到创意园门口，天阴着，风从那排旧厂房之间灌过来，吹得人清醒了一点。我掏出手机给猎头回了句“可以聊聊”。后来真去了。待了七个月。

七个月后决定出来创业。那天晚上在广州天河一个大排档，跟后来一起做企鹅探学的Flora吃饭。桌上是一盘炒花甲和两瓶啤酒，Flora把花甲壳吐在桌上，一边吐一边跟我算从零开始要花多少钱。我听着，筷子戳着碗里的饭。大排档的灯泡瓦数不够，照得人脸发黄。我说我可以辞。Flora看了我一眼，说你想好了。我说想好了。其实那天晚上没怎么想好，但回到出租屋躺在床上看天花板，觉得待在大厂里再待下去，人会钝掉。

2024年底，企鹅探学做了两年多。有天晚上在客厅改方案改到十一点，窗外广州的夜景还是那片灯。我关上电脑，在沙发上坐了一会儿。决定回长沙这件事没什么戏剧性的瞬间，就是在这个沙发上，忽然觉得广州这十年的灯，跟我没什么关系了。第二天跟Flora说了，她沉默了一会儿，说“你回去也好”。

回长沙之后白天上班，晚上偶尔去酒吧。酒吧叫葡滋，跟一个姓周的兄弟合伙开的。决定开酒吧那天是在他家里喝酒，喝到半夜，他说要不我们一起开个酒吧。我当时有点上头，说行。第二天醒来想了想，觉得也行。白天上班有白天的节奏，晚上酒吧有晚上的节奏，两件事搭在一起，人反而比只做一件事的时候清醒。

地铁报站，6号线到了。我松开扶着杆子的手，手心有点凉。车门开的时候，站台的风灌进来，带着一点地下的潮气。
`,hk=`---

date: "2026-07-04"

小唐站在吧台后面，左手摇酒壶，右手擦杯子。长沙七月的一个晚上，店里只有两桌客人。空调开着，吧台上方那盏暖黄色的灯照在他手背上，青筋一跳一跳。我在吧台最里面坐着，面前一杯“爱晚亭的晚风”，伏特加打底，西柚汁和蔓越莓汁碰到一起，杯口泛着淡粉。

这是小唐来葡滋的第四个月。他是阿杰走了以后来的。阿杰去深圳那天，我把“城市灵感系列”的酒单交到他手上，十款酒，十句话，每句后面跟着一个长沙的故事。他抄完配方问我，哥，岳麓山的薄雾是什么味道。我说，你去爬一次就知道了。我做了十年品牌，那一刻也答不上来。

第二天早上六点他去了。五月岳麓山的清晨有薄雾，石阶是湿的。那晚他在吧台试酒，伏特加打底，黑加仑力娇酒加进去，颜色变成灰蒙蒙的紫。又挤菠萝汁，尝一口摇头。第九版他才点头，把杯子推到我面前。我喝了一口，那种潮的、草木未散的味道，像那座山清晨的样子。那款酒叫“五月岳麓山”。

十款特调每款都有自己的来路。“暗恋桃子”用朗姆酒和牛奶，白桃糖浆藏在里面，先甜后涩。“半醉长沙”白兰地加朗姆，柠檬汁压住了。“冷萃夜色”是阿杰走之前调的，伏特加加咖啡利口酒加espresso。“湘女多情”朗姆配椰奶，蓝橙力娇酒调出淡蓝。“蓝上海”也用蓝橙力娇酒，老周说长沙酒吧起上海的名字干什么，我说湘江也蓝。“阳光下的星星”没酒，番石榴和荔枝汁。“星沙莓缘”堆了热带水果。“寻梦葡园”葡萄加玫瑰糖浆加雪碧，喝完有玫瑰味。

小唐调“爱晚亭的晚风”调了整整一星期。我让他去爱晚亭坐一晚上。他真去了，回来说，风是凉的，但吹在身上不冷。他重新调，伏特加打底，西柚汁、蔓越莓汁、桃子糖浆，改了五次。最后那版端给我，淡粉色，入口先是桃子的甜，尾调带一点西柚的微苦。我说就是这个。他笑了一下，第一次在店里笑。

“一半烟火，一半诗意”，这句话是我自己给葡滋起的。烟火是吧台后面的油锅，暹罗酸辣脆皮鸡滋滋响，山胡椒麻辣牛肉条一上桌，木姜子油满屋子都是。诗意藏在酒里。“暗恋桃子”是没说出口的心动，“爱晚亭的晚风”是吹在身上不冷的风。我还做了“情绪收容所”“i人友好酒吧”的概念，菜单上有“独自快乐套餐”“今天不想说话”这种名字。

说起来心虚，这些概念在人多的时候才好讲。葡滋开在保利山姆楼上，楼下是山姆会员店，人流确实大，但都是来买东西的，买完推着车就走，不会上楼来喝一杯。工作日晚上，店里经常只有两三桌。我有时候想，一个“情绪收容所”如果没什么人进来，它还成不成立。

上个月有个男生一个人来，坐吧台最里面，点了一杯“暗恋桃子”，喝完又要了一杯。我问他是不是想起什么人，他没接话，结账时说，大学时候喜欢过一个女生，没说。我说这酒就是给那种人调的。他笑了，说下次还来。他第二次来是三天以后，点的是“冷萃夜色”，最后一口喝得很慢。我问他今天怎么样，他说，还行。就两个字。

还有个客人连来四天，每天同一杯“爱晚亭的晚风”，第四天问我酒名字谁起的。我说我。他说，挺好的。这几个人，没有一个是从楼下路过顺手推门进来的。山姆那么大的人流，没有一个人因为路过上来喝杯酒。他们被什么吸引来的我说不清，可能就是那句话，可能就是那杯酒。人少，但来的每个人都跟酒待了很久。

小唐把酒杯收走的时候，看了眼时间，十一点四十。店里的灯还亮着。坐着没动，想着岳麓山的薄雾怎么落进杯子，还有那个喝“冷萃夜色”喝得很慢的男生。楼下山姆已经关门，停车场空了，吧台上方那盏灯还亮着，照在小唐擦杯子的手上。
`,gk=`---
id: "cross-industry-brand"
title: "尖沙咀那间会议室的冷气"
date: "2026-07-20"
summary: "尖沙咀一间写字楼，冷气吹在后颈上，对面是我的合作方。"
tags: ["品牌","方法论"]
category: "brand"
lang: "zh"
---
2017年那个夏天，香港尖沙咀一栋写字楼的二十几层，冷气开得让人想加件外套。我坐在长桌一头，对面是亚洲万里通的人。亚洲万里通，国泰航空的里程计划，那年我们跟它谈租租车的合作。冷气风口正对着我的后颈，我把杯子往旁边挪了挪。

会议桌上摆着两台笔记本电脑，一台是我带来的，一台是他们的。我打开方案，讲到一半，对面那个戴眼镜的女生点了一下头，说这个积分兑换的入口，我们可以做首个同类型平台合作伙伴。我手心有点潮，但没让它看出来。会议室的玻璃墙外面是维多利亚港，船在海上慢慢走。

我那时候已经在租租车做了几年，主要管品牌和合作。租租车做出境自驾，把国内的人送到国外的车里，再把国外的路开一遍。说到底就是把人从一个地方挪到另一个地方，中间那段挪动的过程，是我们要填的缝。亚洲万里通把人从地面挪到天上，里程积分在中间架一座桥。两个生意看起来差很远，拆到最底层，都是把人从一个场景送进另一个场景。

冷气还在吹，我喝了一口水，水是凉的。

2020年，我换了地方，广州TIT创意园。易车的广州分部在那儿。园区里有几家咖啡馆，下午总有人端着杯子走来走去。我的工位靠窗，能看见楼下绿化带的几棵树。

我在那儿做MO卡，车主会员体系。易车做汽车媒体和交易很多年，手里有海量的车主数据，但这些人散在各个页面、各个App里，没有一个统一的地方让他们停一停。MO卡想做的就是把这些人拢起来，给他们一个能站住脚的身份。跟租租车把出境自驾的人拢到一起，是一回事。人是同一个人，从看车的页面走到会员卡页面，从研究去哪自驾走到下单租车，中间要跨好几道坎。

那时候我常加班。园区晚上九点以后基本没人了，只有几栋楼的灯还亮着。我在工位上对着屏幕改方案，窗外能听见园区里保洁阿姨拖地的声音。我把MO卡的权益拆了又拆，拆到最小颗粒，再拼回去。拆拼的过程里我慢慢想清楚一件事：跨行业做品牌，能带走的东西就那么几样，其中一样是把人从一个场景送到另一个场景的能力。

2023年。广州南沙，一个农业公园类型的农场。企鹅探学，我后来自己做的研学品牌，那天是第一场活动。好几十组家庭报名，比我预想的多。农场里有一片菜地，绿油油的，孩子们蹲在地里拔萝卜、摘青菜，家长在旁边拍照。有个小男孩蹲在地里不起来，他妈叫他，他不肯走，手里攥着一把小白菜。

我站在菜地边上看着。那天下午太阳不算太毒，但蹲久了腿会麻。有个妈妈走过来问我，这些菜能不能带回去吃。我说能。她拎着一袋菜走了，孩子在后面跑着追她。

研学这个词说起来大，拆开看就是把城里的孩子送到田里，把田里的东西带回家。

冷气回来了，我又坐回尖沙咀那间会议室。杯子里的水凉了，对面的女生合上电脑，说那我们推进一下。我点了一下头。冷气从头顶的风口吹下来，吹在后颈上。

id: "cross-industry-job"
title: "面试官问我懂不懂车"
date: "2026-07-12"
summary: "面试官问我懂不懂车，我说不太懂，但可以学。"

---
2019年六月，广州。我坐在出租屋的书桌前，面前摊着笔记本电脑，屏幕上是简历。经历一栏排满了旅游：平安银行在那儿，华夏银行在那儿，香港航空也在，还有南澳大利亚旅游局一场推介会。这些都是我在租租车做商务拓展时对接的客户。第二天要去面试易车，一个汽车互联网公司，市场岗位。简历上跟汽车有关的字一个都找不到。

我把“南澳大利亚旅游局推介会”那一行选中，删掉，又撤销，删掉，又撤销。光标在那一行闪。窗外有人在楼下炒菜，油烟味飘上来。删掉这些旅游客户，简历就空了大半；留着，对方一看就知道我是做旅游出身的。那天晚上改到十二点多，最后留了几行，把“旅游”两个字尽量往不显眼的地方塞。

第二天去面试。面试官三十多岁，戴黑框眼镜，桌上一杯没怎么动过的咖啡。他翻了几下简历，抬头问我：“你做过汽车吗？”我说没有。他追了一句：“那你觉得你能做汽车互联网的市场吗？”我当时手心有点出汗，但嘴上没停。我说我在租租车对接过租车公司，租车和买车的人在决策路径上有一部分重合，我做过的事情有一部分能迁移过来。他没接话，在简历上写了几个字。我不知道他写了什么。

后来我拿到了offer。入职之后才知道，他跟别人说我“答得挺实诚，没瞎编”。

2022年，我在太平洋汽车待了七个月之后出来创业，做企鹅探学。这一次没人面试我了。我自己问自己：做过亲子研学吗？没有。搭过从零开始的东西吗？也没有。那天晚上在客厅坐到很晚，茶几上摊着商业计划书草稿，旁边一杯凉了的茶。问来问去，能给自己交代的只有一件事：我会找渠道。把一个陌生领域讲清楚，这事练过。被拒绝了厚着脸皮继续聊，也练过。这些跟亲子研学没什么关系，跟旅游和汽车也搭不上。但它们在哪儿好像都用得上。

回长沙之后，有一次跟一个做餐饮的朋友聊天，他想转行。问我跨行业难不难。我说行业知识可以补，真正卡人的是你坐到面试官对面的时候，怎么让对方信你那些跟这个行业无关的经验。他说你说的我听不懂。我笑了，说我也说不清楚，就是当时面试的时候手心出汗，嘴没停。

那天晚上从他店里出来，街上人不多，路灯把影子拉得很长。我走到路口等红灯，手插在口袋里，摸到一张揉皱的收银小票。
`,mk=`---
id: "silver-tourism"
title: "五一广场全是年轻人"
date: "2026-06-24"
summary: "在茶颜悦色的一次闲聊，让我发现一个被忽略的需求。"
tags: ["旅游","观察"]
category: "insight"
lang: "zh"
---
在长沙五一广场附近的一家茶颜悦色，我和老朋友坐了快两个小时。

他去年和我一起跑过长沙的中小学研学和康养市场，跑了半个月，聊了几十个人，最后发现那个赛道比想象中难做。但那天聊着聊着，他突然冒出一句："你说，外地老年人来长沙这件事，怎么好像没人认真做？"

我端着杯子愣了一下。他之前在长沙做本地业务，比我更熟这片市场。我问他为什么不试试做外地老年人来长沙的定制小团，他也愣了：

> "没想过，外地人来长沙不都是年轻人为主吗，喝茶颜悦色吃辣椒炒肉打卡吗？"

这个反应本身就有意思。两个研究过长沙本地服务市场的人，都没往这个方向想过。

回来之后我翻了翻数据。我国60岁以上人口已经超过2.8亿，长沙银发经济市场规模目前约800亿。今年春节假期，长沙接待游客949万人次，其中50岁以上游客占了将近三成。同程旅行的数据更直接，60岁以上老年用户的人均住宿花费比年轻人高出三成以上。在定制游领域，银发族单次平均花费超过一万二。

也就是说，老年人不是不舍得花钱，是不舍得为不匹配的产品花钱。

但你在OTA上翻一圈，给老年人设计的长沙行程几乎找不到。全是年轻人版本：打卡、拍照、特种兵。大巴接送、景点打卡、团餐、购物店，大部分"老年团"还是老样子。我看过一组调查，超过七成老年游客反映现有产品"赶路多于赏景"。对年轻人来说是充实，对老年人来说堪比渡劫。

上个月我专门去了趟东茅街茶馆。那座由1952年老礼堂改造的茶馆，2元葱油粑粑、5元花生瓜子、8元茶饮无限续杯。银发客群占比已经到了四成。我坐在角落里观察了一个下午，来的大多是本地老人，但偶尔也有外地口音的。一个从武汉来的退休教师，坐在靠窗的位置，要了一壶茶，翻了一下午的《长沙晚报》。他跟我说，退休之后每年出来玩两趟，但每次报团都后悔。"上次那个团，坐大巴坐了四个小时，到了就拍照，拍完就走。"

他说这话的时候语气很平淡，像在讲一件早就认了的事。

长沙其实有不少适合老年人的东西。马王堆、岳麓书院、铜官窑，年轻人可能拍张照就走了，但老年人是真的会站在前面看很久。宁乡灰汤温泉、长沙县麻林温泉在打康养牌。仲景文化园、九芝堂中医药博物馆这些点位已经入选湖南省首批中医药康养旅游精品线路。交通也方便，高铁飞机通达全国，适合三到五天的短途深度游。

政策和基础设施也在往这个方向走。全市已经完成34个4A级及以上景区的无障碍设施改造。岳麓山索道升级后银发游客占比提升到三成。今年还有银发专列开到长沙，广铁集团在湖南已开行67列，服务了五万多名老年旅客。如果能把专列抵达长沙后的"最后一公里"承接好，接站、住宿、定制行程、送站，这就成了一个完整的东西。

但市场上一真正懂老年人的定制化产品还是太少。老朋友那天在茶颜悦色问我的问题，其实指向一个更具体的东西：人从哪来？定价怎么定？信任怎么建？

获客这块，传统OTA平台老年人用得少。线下旅行社、社区、老年大学、子女推荐，可能更有效。定价我一开始拿不准，定制小团肯定比大巴团贵，但老年人真的会嫌贵吗？后来翻了翻数据，超过六成退休人员每年旅游预算5000块以上，定制游单次花到一万二的大有人在。不是花不起，是觉得不值。

信任可能是最难的一关。老年旅游这个市场被低价团和购物团伤过太多次了。很多老年人一听"旅行社"三个字就先警惕起来。今年新出的《旅行社老年旅游服务要求》国家标准，从行程设计、购物规范、安全保障方面提了具体要求，但光有标准不够，还得有人真按标准做。

从茶颜悦色出来的时候，天已经黑了。五一广场还是人挤人，全是年轻人的脸。我站在路边等车，想起那个武汉退休教师说的话。

他那天临走的时候加了我的微信。上周给我发了一条消息，说他九月份想带老伴再来一趟长沙，问我能不能帮忙安排。他说不赶，慢慢走就行。

我回他说，好。
`,yk=`---
id: "startup-choice"
title: "你说你想自己做一个东西"
date: "2026-07-08"
summary: "Flora把花甲壳吐在桌上，说最差的情况就是钱烧完了什么都没做出来。"
tags: ["职场","创业"]
category: "insight"
lang: "zh"
---
2022年十月的一个下午，我在太平洋汽车的工位上写辞职信。写得很慢，删了改，改了删。办公区的空调嗡嗡响，旁边工位的同事在打电话，声音压得很低。我把辞职信的标题打出来，又删掉，最后只写了一句“本人因个人原因提出离职”，后面跟了日期。鼠标悬在发送键上，停了大概一分钟。点下去的时候手心没什么汗，就是胃有点紧。

这事的起因是前两天的一个晚上。Flora约我在天河一个大排档吃饭，说她想做一个亲子研学的项目，问我入不入。Flora是我认识几年的朋友，做教育的，一直想自己出来干。大排档桌面上摆着一盘炒花甲，两瓶啤酒，旁边是别人留下的一堆虾壳没收。Flora把花甲壳吐在桌上，一边吐一边跟我算：从零开始要多少钱，最差的情况是什么。我听着，筷子戳着碗里的饭。灯泡瓦数不够，照得她脸发黄，嘴边沾着一点花甲的汁。

我说我在大厂待着也挺好。她说你待着也挺好，但你上次跟我说你想自己做一个东西。我想了想，好像确实说过这话，大概是在某个加班到很晚的晚上，抱怨了一句。

第二天上班，我坐在太平洋汽车的工位上，盯着后台那个百分之五十二的数据。这个数据是我花了七个月从百分之零点五拉上来的。拉上来之后没觉得高兴，就累。下午开了两个会，会上有人说“接下来要把活跃度做到百分之七十”。我在会议室里听着，忽然对把数字从五十二拉到七十这件事提不起劲。Flora昨晚说的那个从零开始，倒是一直在脑子里转。

散会之后回到工位，打开邮箱，开始写辞职信。写的时候想起大排档那盘炒花甲，Flora嘴边的汁，她算账时拿筷子在桌上比划的样子。她说最差的情况就是钱烧完了什么都没做出来，“但你好歹试过了”。这句话我记得清楚。

辞职信发出去之后我去找了直属领导。他坐在办公室里，桌上一杯茶凉了。他看完邮件，抬头看了我一会儿，问想清楚了没有。我说想清楚了。他说你在太平洋汽车做得挺好，数据摆在那儿。我说我知道。他没再劝，说“那祝你好运”。

`,xk=`---
id: "status-anxiety"
title: "凌晨两点多，我刷了很久朋友圈"
date: "2026-04-17"
summary: "为一条九宫格Plog失眠的那晚，我意识到自己在等一个回应来证明自己算数。"
tags: ["阅读","观察"]
category: "insight"
lang: "zh"
---
凌晨两点十七分。我记得很清楚，因为放下手机之前我瞄了一眼屏幕右上角的时间。

那天是周五。我躺床上刷朋友圈，刷到一条很日常的动态。真没什么特别的，就是那个人发的日常碎片的Plog。九宫格，配了一首歌。但我发现自己看了很久，久到不太对劲。手指停在屏幕上，没往下滑。

我到底在看什么？想从里面翻出点什么来？

后来我把手机扣在床头柜上，盯着天花板。空调嗡嗡地响。脑子里冒出来一个念头，冒出来的时候我自己都吓了一跳：我的存在，有没有意义？

挺可笑的。我知道。凌晨两点，为一个九宫格Plog失眠。搁以前我会骂自己矫情，翻个身也就睡了。但那天晚上没翻过去。

因为那不是第一次了。

我以前觉得，嫉妒就是性格有问题。是那种该藏着掖着、不太好意思说出口的东西。后来读了《身份的焦虑》，才慢慢意识到，嫉妒其实是个信号。我以前嫉妒别人，不是对方真的有多好，是我心里自动把对方当成了裁判。他有的我没有，就说明我不够好。

凌晨两点刷朋友圈，跟嫉妒是一回事。只不过嫉妒的时候你盯着别人拥有的东西，深夜刷朋友圈的时候你盯着别人发出的信号。都是在等一个回应，一个能证明你存在的回应。

第二天醒来，这念头还没走。

我坐在床边发了一会儿呆。窗外的光已经白了。手机震了一下，是外卖到了。我点的是昨晚失眠时候下单的筒骨粉，送达时间是早上七点半。外卖小哥在楼下按了三遍门铃我才下去取。

嗦粉的时候我一直在想，为什么一个回得很慢的消息，会让人觉得像在等一个判决？为什么一段安静，会让我开始怀疑自己是不是不够重要？连那个曾经和我有过最深交集的人，我还是会掉进同样的坑里。在沉默和没说出口的话中间，反复琢磨，反复消耗自己。

那阵子我正好在读《身份的焦虑》。这本书最早是有人问我最近在看什么，我随手拍了封面发过去。没想到几个月后，我会在满脑子乱糟糟的想法里把它读完。书就扔在床头柜上，跟手机、眼镜、半杯隔夜的水摆在一起。那些关于焦虑的文字一下子涌过来，背后全是我们对话之后，那些没说清楚的空白。

书里有一段话是这么写的：

> 有一种焦虑，焦虑到能毁掉我们一大段人生：我们害怕自己够不到这个社会定下的成功标准，害怕因此被剥去尊严，不再被尊重。

看了两遍，又看了第三遍。

粉汤凉了。我把剩下的一点喝完，有点涩。

那段时间我想明白了一件事。我深夜刷朋友圈，跟别人没关系。是我自己的事。是那种没被选择的恐惧。是我的存在，好像不足以让某个人为我停留。哪怕那个人的故事已经翻篇了，哪怕新的章节正在开始，这种感觉还是会赖着不走。

德波顿管这叫"身份的焦虑"。那种想被看见、被尊重、被爱的渴望。不是被所有人，是被那些你在意的人。

我有一次跟我妈视频，她问我最近怎么样。我说挺好的。她说你气色不太好，是不是没睡好。我说嗯，最近有点忙。她看了我一眼，没接话。然后说，家里做的腊肉寄给你了，记得收。

挂掉视频我才意识到，我跟我妈也是这样。她说"气色不太好"的时候，我在等她说"别太累了"。她没说，我就开始琢磨，是不是我表现得还不够疲惫，所以她没当回事。你看，连我妈，我都在等一个回应来证明自己被在意。

后来慢慢想明白，成功是个会自己往前跑的目标。社会就这么设计的，让你一直跑，一直追，一直消费。你刚够到一个，下一个马上冒出来。没完没了。

我们这代人有意思。被反复告知你生而平等，却比谁都容易觉得自己不够好。因为我们在拿自己的幕后，去比别人的精修预告片。拿自己没滤镜的日常，去比旧爱回忆里加了柔光的温暖，去比新关系里模棱两可的信号。

但这本书真正留给我的，是一个词，叫做视角。

那些爱你的人，爱的不是你精心排版的主页。他们爱的东西，你根本不会写进个人简介里。是你半夜乱七八糟的念头，是不需要费力解释的沉默，是那个"本来就够了"的你。

上周末我去了一趟超市。结账的时候排在我前面的是一个老头，买了两袋米、一捆葱、一盒鸡蛋。他掏出手机扫码，扫了三次没扫上。收银员小姑娘很有耐心，帮他调出付款码，又帮他把手机举到扫码器前面。老头嘴里一直念叨"谢谢你啊小姑娘，这个我不太会"。小姑娘笑了一下说没事爷爷，下次您来我还帮您。

我站在后面看了一会儿。那个老头走出超市的时候，步伐很慢，但很稳。

我拎着自己那袋东西往回走，太阳正好。路边有个小孩在骑平衡车，摔了一跤，爬起来接着骑。

我突然想，我一直在跑一场比赛。一场必须被看见、被选择、被记住的比赛。但我好像根本没报名。那条终点线，我以为只要某个人关注我，就证明我有价值，每次我快靠近，它就又往前挪了。

也许重点从来不是赢。

那天晚上我没有刷朋友圈。我九点多就困了，关灯就睡。半夜醒过一次，摸到手机看了一眼时间，三点零四。没有打开任何一个app。又睡了。

第二天早上是被楼下收垃圾的车吵醒的。六点四十。窗帘缝里漏进来一道光，正好照在床头柜上那本《身份的焦虑》上。书还翻在那一页，折了一个角。

我起来给自己倒了杯水，站在窗边喝。楼下那个老头又出来买菜了，手里拎着跟昨天一样的布袋子。

我想，也许下一次半夜翻来覆去睡不着的时候，我还是会胡思乱想。但至少我知道，天总会亮的。楼下会有人去买菜，收垃圾的车会来，楼下杨裕兴粉店六点半就开门。

这就够了。
`,Pk=`---
id: "study-tour-competition"
title: "对面打了个哈欠的那个下午"
date: "2026-07-16"
summary: "讲到第八页，对面打了个哈欠，没看我，在看窗外。"
tags: ["研学","观察"]
category: "insight"
lang: "zh"
---
2023年冬天，广州番禺，一个政企项目的竞标现场。会议室不大，圆桌，几把椅子，墙上挂着一块白板，白板上还留着上午别的会写的字，没人擦。我坐在桌子这边，对面坐着几个甲方的代表，其中一个中年男人听了一会儿，打了个哈欠，没捂嘴。

我手里攥着一份方案，A4纸，二十几页。我讲到第八页的时候，他打哈欠。我停了两秒，看他，他没看我，在看窗外。那天广州很热，会议室空调开了，但吹不到我这边，我后背有点潮。

研学这行从2022年开始就卷得厉害。我做企鹅探学，最早一场活动是2023年，在广州南沙，一个农业公园类型的农场。那天好几十组家庭来，农场里有一片菜地，孩子们蹲在地里摘菜，有个小男孩蹲着不肯起来，手里攥着一把青菜要带回家吃。我站在菜地边上看着，太阳不算太毒，但蹲久了腿麻。那场办下来我觉得这事儿能做，家长愿意来，孩子愿意蹲下去。

没过多久就变了。

家长群里的比价越来越狠。一条线路，五个机构报五个价，差几十块家长就能聊一个下午。有人把五家的行程表拼到一张图里发到群里，逐项比对，几点集合、几点吃饭、有没有含保险、几点送回。家长比得比采购还细。

线路同质化也压上来。广州做研学的，五家里有四家做同一条非遗线路，同一个传承人，同一个作坊，孩子们带回去的手工作品都一样。我那年去看了一圈，回来在共享空间的桌子上坐了很久，没说话。对面工位的人问我怎么了，我说没事，在想怎么跟别人不一样。

2024年春天，香港科技大学广州校区那场活动算是个例外。我设计了一条跟校园科研结合的线路，把孩子们带进实验室外面那条走廊，让他们看研究生在做什么。那场转化率做到60%，自然流量增长40%。但那是一场一场磨出来的，磨的时候手心一直在出汗。

后来竞标现场那个打哈欠的中年男人，最后选了另一家。那家报价比我低，线路跟我差不多。我走出会议室的时候，走廊的声控灯亮了一下，又灭了。我站在那儿等它再亮，它没亮。我跺了一下脚，它亮了。

卷这个字，说到底就是大家挤同一个地方。要破这个局，得找到别人没蹲过的那块地。南边那个农场的小孩攥着青菜不肯走，那一下我记了很久。家长愿意为那种蹲下去的瞬间付钱，不愿意为一张跟别人一样的行程表付钱。

回到家里，我翻开一个旧文件袋，封面上的照片是2023年那场农场活动，几个孩子蹲在地里，背对着镜头，手里攥着菜。窗外天黑了，楼道的声控灯亮了一下，又灭了。

title: "那通被挂掉三次的电话"
date: "2026-07-14"
summary: "那通电话被挂了三次，第四次对方终于听完，说再发个资料看看。"
tags: ["职场","方法论"]
category: "insight"
lang: "zh"
---
广州六月，写字楼的空调开得不够，后背的汗把衬衫贴在椅背上。桌上摊着一张A4纸，圆珠笔划了二十几个名字，旁边是电话号码。有的名字后面打了勾，有的画了叉，大部分什么都没打。我刚拨完一个电话，对方听完“您好我是租租车的”就挂了。那天第三个挂我电话的人。

那是2016年，我刚进租租车做商务拓展。在那之前没打过冷电话。前几通手心出汗，话说到一半卡住，对方问“你谁啊”我差点答不上来。后来慢慢摸出门道，被挂了就再约，约不上的换个小时段打过去，约上的就见面。有一个做租车的老板，电话里回了三次“没空”，第四次我换了个时间打，他说“那你来吧”。我在他办公室坐了一下午，聊的都是他店里的生意，没怎么聊我们的产品。走的时候他说“你加我微信吧”。开口这件事，三年里慢慢磨出来的。

2019年我去了易车，在广州TIT创意园那栋楼里上班。工位正对窗户，下午阳光斜进来照得屏幕反光，我老要把椅子往左边挪。那阵子在做MO卡，车主会员体系。刚接手的时候挺乱，合作方要的东西和内部产品的逻辑对不上，运营又按自己的节奏走，全搅在一块。我每天干的就是把这些线一根根捋出来，接到该接的地方。有一个下午连开了四个会，最后一个散会天已经黑了。我坐在工位上把白板上的流程图拍下来发给同事，配了句“今天终于把这个东西拢成了个样子”。拢东西得有耐心，还得知道哪根线接哪根。

2022年三月到太平洋汽车，高级商务运营经理。进去的时候有个数据很难看，用户活跃度百分之零点五。我坐在会议室里，投影打在墙上，那个数字像一块白斑。老板说七个月之内做到一个能看的数据。我没接话，回工位翻后台翻了两天。之后的事说起来不复杂，改个规则，推个活动，数据没动就回头找问题。七个月里几乎没在晚上十点前下过班。十月份活跃度到了百分之五十二。那天我在工位盯着后台看了很久，没觉得高兴，就累。

同年十月我从太平洋汽车出来，跟人合伙做了企鹅探学。没有办公室，就在我家客厅办公，茶几上堆着电脑和外卖盒。客户得自己跑，连个像样的产品都还没影。第一个客户跑了六七趟才签下来，签下来的那天晚上我在客厅坐了很久，窗外广州的夜景一片一片亮着。从零搭东西，最难的是开始那一下，你不知道搭出来的有没有人要。

2025年回了长沙。白天上班，晚上偶尔去酒吧。酒吧叫葡滋，跟一个姓周的兄弟合伙开的。有天晚上我在吧台后面站着，看一个客人点了杯酒，喝两口放下，跟同伴说了句什么，俩人都笑了。我忽然反应过来，做了十年这行，我一直在学怎么把东西做出来、推出去。回到长沙之后慢慢学会的，是停下来看看做出来的东西有没有人真在用。吧台后面的灯是暖黄色的，照在那杯喝了两口的酒上。
`,wk=`---
id: "validate-brand"
title: "活动结束，那个妈妈说了句哦"
date: "2026-06-19"
summary: "第一场活动结束，一个妈妈说了句\\"哦\\"就走了。"
tags: ["增长","研学"]
category: "insight"
lang: "zh"
---
在广州南沙的一个研学基地，是我第一次组织企鹅探学的研学活动。

那天有二十多个孩子，跑来跑去，家长站在旁边刷手机。活动结束了，有个妈妈问我：你们下次还有吗？我说有。她说哦，然后走了。没加微信，没留电话。

我站在那个活动中心的门口，看着家长带着孩子一个一个离开。场地空了，灯还亮着。那场活动做得不差，孩子玩得开心，导师也认真。但它跟"企鹅探学"这四个字没什么关系。

当时的团队已经在做品牌和研学产品的设计了，但产品之间没有联系。用户参加完一场就走，留不下印象。我面临的问题很具体：怎么让活动本身变成品牌的一部分。

后来我们做的第一件事，是把活动从"一场一场做"变成"一个产品来设计"。每场活动不是独立的，而是属于某个主题系列，自然探索、城市探访、科技创新，每个系列有固定的视觉风格、命名规则、叙事逻辑。孩子第一次参加觉得好玩，第二次认出风格，第三次就能自发向别人推荐。

第五场活动的时候，我们开始在现场设了一面"品牌墙"。用视觉化的方式展示企鹅探学的理念和体系，家长等待的时候自然会看到。活动结束后，每个家庭会收到一份"探索报告"，孩子的照片、这次活动带回家的成果、下一场活动的预告。

导师在活动过程中也会有意识地传递品牌理念，但不是背书，是通过故事和互动自然流露。有个导师叫小林，有次带自然探索系列，孩子们在捡树叶。一个孩子问他，为什么要捡树叶？小林说，因为每片树叶都不一样，就像你们每个人。后来这个孩子的妈妈在朋友圈发了这段对话，配了活动现场的照片和品牌话题。

单场转化率后来做到了六成。不是因为销售话术厉害，是因为转化发生在体验里，不是发生在推销里。用户在离开之前，已经对品牌产生了信任。

我们还设计了一个老带新的轻量化机制。分享活动照片到朋友圈配品牌话题，或者邀请一位好友参加下一场活动，双方都能获得一份孩子喜欢的伴手礼。每场活动结束后，我们会花15分钟做复盘，记录哪些设计让用户愿意分享、哪些环节没到位。

第二十场活动结束的那天晚上，我坐在活动中心外面的台阶上整理物料。有个之前参加过的孩子拉着妈妈的手走过来，指着我身上的企鹅logo说："妈妈，就是那个企鹅。"

他妈妈笑了笑，加了我微信。

---
2022年底，我加入企鹅探学的时候，这个研学品牌已经跑了一段时间。但视觉系统非常散，LOGO是找人画的一只拿着放大镜的企鹅，颜色好几种，字体每个版本换一种。

别说用户了，我们自己都很难说清楚这个品牌的视觉风格是什么。我当时看了一眼那个logo，心想，这得重做。

但我做的第一件事不是找设计师，而是回访了20个家长。问他们同一个问题：你为什么选我们？

答案反复出现三个词："服务靠谱""导师认真""孩子喜欢"。这就是视觉升级的方向，不是好看，是让家长一眼就能感觉到这三个词。

设计评审那天，会议室里吵了两个小时。

设计师拿了三版方案。第一版是卡通风格的企鹅，圆滚滚的，很可爱。团队里有人觉得好，有人觉得太幼稚。第二版是极简线条，高级是高级，但跟"研学"没什么关系。第三版，设计师自己也不太确定，放在最后。

那只企鹅近看，左侧的轮廓是一张人脸。

会议室安静了几秒。有人说"这个有意思"，有人说"会不会太复杂了"。我盯着那版方案看了很久，最后指着它说，就这个。

判断的过程其实很简单。一个做研学的品牌，名字里要有探索感，又要有亲和力。企鹅这个概念，做成卡通会幼稚，做成极简会冷。但如果做成一个有故事的符号，远看是企鹅，近看是人脸，它就有了两层意思。企鹅代表专业和亲和，人脸代表以人为本。用眼睛做点睛，代表用眼睛去体验、去探索。

给家长看的那层：深蓝和白色。深蓝是专业和安全，白色是留白和可能性，点睛用黑色，形成视觉冲突。给孩子看的那层：后续视觉物料里藏了很多小彩蛋，企鹅的脚印、地图元素、放大镜的细节，暗示"这是一个可以探索的世界"。

整个过程持续了三周。换了一套视觉，更新了所有物料，重新拍了品牌宣传片。

效果出来之后，有一天我在朋友圈看到一张活动照片。照片里是一个活动现场的背景板，隔着人群、隔着手机屏幕的压缩，logo已经有点糊了。但评论区有人问：这是企鹅探学的活动吗？

我截图发给了设计师。他回了我一个表情。

一个清晰的符号，不需要宣传语来解释。换logo本身不难，难的是让那个符号里住进一个别人认得出的人。

id: "ai-content-creation"
title: "I Threw Out the Perfect Topic"
date: "2026-06-15"
summary: "One night, AI gave me thirty-something topic ideas. One looked perfect."
tags: ["AI","Insight"]
category: "ai"
lang: "en"
---
One night, I used an AI tool to generate thirty-something topic ideas.

One of them looked perfect,balanced title, fresh angle, airtight logic, even the opening paragraph was drafted for me. I stared at it for five minutes. Something felt off. I couldn't say what exactly, but I just didn't want to write it.

In the end, I threw it out.

I've been using AI tools to help with topic brainstorming for about a year now. The feeling, if I had to compress it into one word, is split. On one hand, I genuinely can't work without it anymore. On the other, I'm constantly reminding myself not to get domesticated by it.

It used to take me a whole morning to develop a deep-dive topic,brainstorming, researching, filtering angles, discussing with someone. Now I let AI handle the first pass of divergence. In the same amount of time, I get dozens of candidate directions, then spend my real energy on judgment and deep processing. This shift in workflow isn't writing articles faster,it front-loads human judgment. The model covers breadth; I cover depth.

But the problem followed close behind. Once topic brainstorming got hyper-efficient, the warmth of content production became very easy to lose. AI-generated suggestions are usually logically correct, structurally neat, and look like they've said everything,but they're missing a kind of human feel. The imperfect perspective born of personal experience. The expression that only surfaces in a specific context. Once that warmth gets smoothed out, content turns into an assembly-line standard part, and readers can tell.

The night I threw out that perfect topic, something clicked: the more perfect the direction AI gives me, the more I need to be on guard. Because perfect things tend to be average. And genuinely good topics always carry someone's particular obsession and blind spot.

I've been looking for a balance point over the past six months. A few things have worked.

AI is a sparring partner for finding topics, not a teacher who decides them. I let it generate a lot of directions, but which one I actually pick is always based on my own experience, judgment, or even a split-second instinct. Like that night,those thirty-something directions were good, but the one I actually wanted to write came to me the next morning in the shower.

I read AI-generated text, but I don't paste it in. I rewrite it in my own speaking voice, even if the structure ends up less clean.

Sometimes I deliberately create friction for myself. I set AI aside entirely, go back to the dumbest method,flipping through books, handwriting outlines,just to keep that feeling of making my head hurt. It sounds inefficient. It's protecting the human warmth in the work.

Brand Relevance actually makes a similar point: people form strong connections with certain brands not because they're more correct, but because they're more like a person. Content creation works the same way. AI can make us more efficient, more thorough,but it can't replace the motive behind why I think this way, and it can't replace those imperfect but sincere expressions.

These days, I prefer to think of AI tools as an amplifier, not a replacement. It gives me more time for what actually matters: observing, thinking, feeling,and putting the warmth that only belongs to humans into every topic.

That topic I threw out that night,it eventually became, in another context, the piece you're reading right now.

title: "On the Eighty-Third Day of Renovation, I Stared at the Bill Without a Word"
date: "2026-07-06"
summary: "Day eighty-three of renovation. Plumbing rerun, eighteen hundred more. Lao Zhou crushed his cigarette."
tags: ["Startup","Brand"]

On the eighty-third day of renovation, it was raining in Changsha. I squatted in the bare concrete room staring at the quotation. Plumbing rerun, eighteen hundred more. Lighting redesign, three thousand extra. The old elm slab for the bar was nearly double the budget. My partner Lao Zhou stood beside me smoking, grinding the cigarette out with his shoe. Neither spoke. That was September 2025, three months before opening.

I had spent ten years in brand work in Guangzhou before moving back to Changsha in 2025. I worked a day job, sat in bars at night, and started wanting one of my own. Puzi opened in December 2025 on the west bank of the river. I am the co-founder. The word co means Lao Zhou calls the shots. His money, my ideas.

We scouted a dozen spots and settled on the floor above Sam's Club in the Poly mall. Downstairs is the membership store, upstairs is commercial space. The day we went to look it was a weekend. The line at Sam's spilled out to the curb, shopping carts clanking together. Lao Zhou stood upstairs looking down and said, if we catch even a fraction of this foot traffic we are fine. I thought so too. That judgment turned out to be the biggest mistake of the whole project, but that day we were both excited.

The permits were another mountain. Each piece of paper had a window behind it. I lined up at the government center all day and finished two stamps. The woman behind the counter asked whether a small bar like ours could survive a year. I said we will see. Ten years of brand work, and that day I learned the word brand was useless at a government counter.

The drink list was the part I knew best. Eight classics on the left, the usual. The ten on the right I named the City Inspiration Series. The first draft was bloated. The bartender A-Jie read it and said, brother, people who are drinking do not want to read essays. We cut until each drink had one line. Peach Secret, the green crush hidden in white peach aroma. Half-Drunk, a decent buzz for the Star City wage earner. A-Jie took three tries to get Miss Tiffany right, rum with coconut milk.

A-Jie left later. His girlfriend was moving to Shenzhen and he went with her. The night before he left we finished the last glass of Espresso Dream at the bar. He said that drink was for people who work by day and dream by night, and he was going to dream somewhere else. I did not ask him to stay. In this business, people scatter before money does.

The new bartender is Xiao Tang, twenty-three, steady hands, but he did not know Changsha. I took him to walk Yuelu Mountain. A May morning with thin mist, the grass and trees damp. He came back and mixed Yuelu Mountain, that grayish purple. AiWan Breeze was his too. He took a sip and said, this wind is cool. I did not tell him I had been about to say the same thing.

The menu was another mess. Lao Zhou wanted pure Western food. I said people in Changsha do not crave steak at midnight. We ended up with a fusion menu. The Siamese sour-spicy crispy chicken is the signature. The western Hunan mountain pepper beef jerky fills the whole room with mujiangzi oil the moment it hits the table.

Opening day was December 12, 2025. At eight in the evening three tables were seated. I stood behind the bar slicing lemons, hands shaking. By eleven the bar was full. A girl ordered Peach Secret, finished it, and asked if the drink had a story. I said it did, the kind you never said out loud. She smiled and said she had one too. We closed at two in the morning. Revenue was under three thousand yuan. Lao Zhou worked the costs for a long time, said nothing.

They did not go up. From the second week on, weeknights often meant two or three tables. The foot traffic at Sam's downstairs was real. But those people pushed their full shopping carts out the door and headed straight for the parking lot. Nobody looked up. One time I watched a man walk out carrying two crates of milk. He never broke stride. Lao Zhou said maybe weekends would be better. Weekends were slightly better, but most found us on Dianping and left after one drink. I had assumed Sam's foot traffic would naturally spill upstairs. After we opened I learned that Sam's shoppers and bar people are simply not the same crowd.

Counting to now, Puzi has been open seven months. Lao Zhou still does the books. Xiao Tang still mixes drinks. Line 2 to Line 6, fifty minutes to the shop. Last month a guest came four days in a row, ordering the same AiWan Breeze. On the fourth day he asked who named the drinks. I said, me. He said, nice.

After he left that night the shop went quiet. Xiao Tang wiped down the bar. The air conditioning hummed. I sat in the innermost chair with a half-finished glass of water. Downstairs, the lights at Sam's were still on. Cars were still pulling out of the parking lot.

id: "brand-trust"
title: "The Noodle Shop Below With No Sign"
date: "2026-05-20"
summary: "A client asked if we could get results faster. I didn't answer directly."
tags: ["Reading","Brand"]
category: "brand"
lang: "en"
---
Last year, a friend asked me: "Can we get results faster?"

He wanted faster growth,more precise ad targeting, cleverer positioning, more viral content. I understood his anxiety. The cash was burning, the market window was closing, every extra month meant another month of team pressure.

I didn't answer him directly. Instead, I asked: "The last time you bought something new,was it because you saw an ad, or because a friend recommended it?"

He thought about it. "Friends, I guess."

Around that time, I'd been slowly making my way through David Aaker's Brand Relevance. The book isn't new, but it reads differently in the current climate. On the surface, Aaker is talking about "creating new categories, avoiding red oceans." But the more I read, the more I felt he was really getting at something deeper: brand growth runs on trust being continually validated and accumulated.

In my own brand strategy work, I keep running into that same client-shaped contradiction,everyone wants "faster growth," but the energy that lets a brand survive across cycles is usually "slow." We think growth comes from a viral piece, a precise ad buy, a clever positioning. But pull those moves apart and look at what makes them actually work: the audience already had a latent trust in the brand before any of it happened.

There's a point Aaker makes that I especially agree with: a brand builds relevance not just by "showing up," but by "consistently keeping its promises." Many category-innovating brands didn't win the market with a single debut. They used sustained product quality and consistent experience to slowly equate themselves with a particular need in the user's mind. That "equating" process is trust accumulating,I trust your product to solve my problem. I trust you won't let me down.

That friend eventually went at his own pace. Three months later, he told me a batch of old users had started referring him organically. He hadn't run any special referral campaign. He'd just delivered on his promises every single time for three months.

Plenty of brands die at the experience gap,traffic comes in, delivery falls short, trust snaps, and growth instantly turns to foam. The brands that last are almost without exception the ones that keep reinforcing trust through action on some small, specific front. The work on my own site,each project I've polished over time,none of them are "viral" on their own. But they're signals that keep building "this person is reliable."

Traffic decides how fast you go. How far you go depends on trust.

Aaker's methodology,finding new competitive dimensions, defining sub-categories,is essentially about giving trust accumulation a clearer container. Category innovation lowers the user's cost of choice. But what actually makes them stay is that you don't let them down, time after time.

It made me more patient with "doing brand." Instead of chasing one wave of growth tactics after another, I'd rather look back and ask: is every touchpoint today depositing into the long-term trust account?

After that conversation with the friend, I walked out of his office building. Downstairs was a noodle shop that had been there for over a decade. There was a line at the door. No sign, no marketing,just a pot of broth simmering for more than ten years. The people in line were neighborhood locals, and a few who'd driven over specially.

I waited ten minutes, ordered a bowl. It was good.

title: "Sweaty Palms on the First Day"
date: "2026-07-18"
summary: "A co-working desk, rent just over a thousand a month. I opened Notion and started building."
tags: ["Brand","Methodology"]

---
October 2022, Guangzhou. A desk in a co-working space, rent just over a thousand a month, the surface just big enough for a laptop and a cup. Outside the window were the towers of Tianhe, and in the afternoons the sun came in at an angle and left a bright strip along the corner of the desk. This was the first prep meeting I called for Penguin Exploration, three of us counting me.

The co-working space always had people moving through. The coffee machine was going, someone was on a call, chair legs scraped the floor, the sounds all mixing together. I turned the laptop toward the two across from me, on the screen the activity framework I had built in Notion, page linking to page, like a net. One of them was a teacher who had run study tours before, she looked at it and said, the framework is clear enough, but for the first event you have to decide who you're taking, where, and to do what. I nodded, palms a little damp.

First days are always like this. You have an idea in your hands, but the idea is soft, blurry, something you can't even explain clearly to yourself, and you have to make it into a place other people want to walk into. The step from zero to one, you can call it a few nodes, but living through it is just your palms sweating the whole way.

April 2025, Changsha. Different city, different desk, this time at a new company. The company had just rented a floor, the desks were new, the chair had a catch when you spun it. The job I took on was to build a brand system in thirty days.

I opened Notion at my desk and started making documents. The first was called Brand Positioning, the second Visual System, the third Content Framework, one after another, and by the time I was past a dozen the links between documents began to hold together. The thing about Notion is you can build it like blocks, break a concept into pieces and put it back. I dragged things around on the screen, moved one block, the whole structure shifted with it.

Those weeks I often stayed late rewriting copy. Spring in Changsha is damp, the workstation got cold at night, I draped my jacket over the back of the chair. Rewriting copy on a screen is as slow as on paper, sometimes I'd get stuck half an hour on a single title. But with Notion, once I saved, everyone saw the newest version, no sending files, no version-matching. One night I was at it until two in the morning, the elevator had stopped, I took the stairs down, and in the stairwell the sound-controlled lights came on one by one and went off one by one.

Halfway through, I looked back at those documents and saw they had grown from a pile of scattered ideas into a place a person could walk into. Positioning was the doorway, and moving inward the walls and lighting belonged to the visual system, and further in the content framework set out what was placed in the rooms. The step from zero to one is turning the blurry into the clear, gathering the scattered, so that the person passing by wants to stop and step in.

December 2025, still Changsha. Puzi Bar, I had become a co-founder. My partner's surname was Zhou, a few years older than me, he had been in food and beverage for over a decade. We sketched the first version of the menu on a cocktail napkin, Brother Zhou's handwriting was better than mine. That stretch of road had a lot of foot traffic at night, outside the window people lined up for milk tea, the sound-controlled light kept going on.

Puzi went through those same nodes again from zero to one. The first day of each node, my palms sweated. It was the same at that co-working desk for Penguin Exploration, and the same at the new company's workstation.

That day Brother Zhou asked me, why are you nervous every time you start. I said I didn't know, maybe I'm afraid what I make won't be a place anyone wants to walk into. He laughed, said nothing, wiped the cup and set it down.

The line outside had broken up, the milk tea shop had closed. Another sound-controlled light went off.

id: "brand0-1"
title: "Most Lights Off, the Desk Lamp Still On"
date: "2026-06-22"
summary: "Day one on the job: build an entire brand system in thirty days."
tags: ["Brand","Methodology"]
category: "brand"
lang: "en"
---
My first day on the job, the boss gave me a task: build the entire brand system for "XiaoA Jingling," an AI English tutoring brand, in one month.

Positioning, visual identity, brand guidelines, website, launch event. Everything.

I sat at my desk staring at that sentence for a long time. Thirty days for brand positioning, visual system, website, and a launch event. Tight timeline, small team, high bar. Okay then, I thought.

On the third night, I got stuck.

I'd spent two days thinking about "what we should do",AI teaching, smart tutoring, personalized learning. I listed a bunch of directions. Each one sounded right, but each one was also vague. That night I wrote them all on the whiteboard and stared at them for half an hour. Then it hit me: I'd been adding things the whole time, never subtracting.

The next day I flipped the question. Instead of "what should we do," I asked "what should we not do."

I talked with the founder for a straight week, an hour a day, going through all the accumulated user feedback and competitor materials. On the fourth day, he said something,"Actually, parents don't choose us because our AI teaching is good. They choose us because after coming here, their kids start speaking English on their own."

That woke me up. The core of this brand wasn't "AI teaching." It was "making kids fall in love with learning." That gap in perception was the starting point for the brand positioning. We landed on: precise pronunciation, global conversation, your AI English expert. Slogan: "Pin yin yao zhun, jin bu yao hen, wei lai yao wen",accurate pronunciation, fierce progress, steady future.

Once the positioning was set, everything else moved fast.

I made two versions of the brand guidelines. One was the full version, for the design team and external vendors,everything in there. The other was a slim version for sales, marketing, and operations,ten pages, each answering the same question: "How do I use this brand?" Most brand guidelines are incomprehensible to anyone besides the designer. That's a waste.

The website was three pages: home, product, brand story. I did the interaction prototypes myself; design handled visuals. Not chasing perfect,chasing "shippable and readable." The brand's proprietary nine-level growth system and its learning requirements got locked in too.

I wrote the entire launch event plan myself,creative concept, visual system, the founder's keynote. The core was simple: explain what the brand is, explain what the advantage is. No slide-stuffing.

Thirty days later, we launched. The brand system wasn't perfect, but it ran. The whole team went from "not knowing how to introduce ourselves" to "everyone can explain who we are."

The night after the launch event, I sat alone in the office. Most of the lights were off,just my desk lamp. Scattered on the desk: whiteboard markers, a printout of the brand guidelines, a cup of cold coffee.

Was I tired? Yes. But those thirty days were really helping me figure out one thing: the core of a brand isn't the logo or the colors. It's a complete cognitive system,knowing what to do and what not to do. I couldn't have articulated that at the time, but looking back, every moment I got stuck during those thirty days was answering that question for me.

id: "career-decisions"
title: "Line 2 to Line 6, Forty Minutes Each Way"
date: "2026-07-10"
summary: "Line 2 to Line 6, forty minutes each way. I leaned against the pole, counting badges."
tags: ["Career","Insight"]

Changsha morning rush hour. Line 2 to Line 6, forty minutes each way. I go through the gate at seven forty every morning. The car is packed too tight to turn around. Some people look down at their phones. Some lean against the door with their eyes closed. I like to stand in the section between cars, one hand on that cold metal pole. Most days I let my mind go blank for those forty minutes. But sometimes my brain starts up on its own, drifts to some moment when I made a decision.

Early 2022, still at Yiche. One afternoon at my desk in Guangzhou's TIT Creative Park, I got a message from a headhunter. Pacific Auto was hiring. I didn't reply right away. Yiche was a big company. The work flowed smoothly, the benefits were good, and in the afternoon the sun came through the window and fell across the keyboard. Pacific Auto was also a big company, but the role meant taking over a mess of data. You'd have to sort it out yourself. When I left work that day and walked to the gate of the creative park, the sky was overcast. Wind blew through the gaps between the old factory buildings and cleared my head a little. I pulled out my phone and sent the headhunter: “Sure, let's talk.” I went. Stayed seven months.

Seven months later I decided to leave and start something. That night at a dai pai dong in Tianhe, Guangzhou, I had dinner with Flora, who would later start Penguin Exploration with me. On the table: a plate of stir-fried clams, two bottles of beer. Flora spat the clam shells onto the table, counting out loud how much it would cost to start from zero. I listened, poking at the rice in my bowl with my chopsticks. The light bulb at the dai pai dong wasn't bright enough. It made everyone's face look yellow. I said I could quit. Flora looked at me and said, you sure about this? I said I was sure. Truth is I wasn't really sure that night. But back in my apartment, lying on the bed staring at the ceiling, I felt like staying in a big company any longer would dull me.

Late 2024, Penguin Exploration had been going for over two years. One night I was revising a proposal in the living room until eleven. Outside, the Guangzhou skyline was the same stretch of lights as always. I closed the laptop and sat on the couch for a while. Deciding to go back to Changsha didn't have a dramatic moment. It was on that couch, suddenly feeling like the last ten years of Guangzhou's lights had nothing to do with me. I told Flora the next day. She was quiet for a moment, then said, “It's good for you to go back.”

After moving back to Changsha, I work during the day and sometimes go to the bar at night. The bar is called Puzi, started with a partner whose family name is Zhou. The night we decided to open it, I was at his place drinking. Past midnight, he said, let's open a bar together. I was a bit drunk. I said sure. The next morning I thought about it, and it still seemed fine. The day job has its own rhythm, the bar has its own rhythm. The two of them together, somehow I feel more clear-headed than when I was only doing one thing.

The subway announced the station. Line 6. I let go of the pole. My palm was cold. When the doors opened, air from the platform rushed in, carrying a faint dampness from underground.

id: "changsha-cocktail"
title: "On the Ninth Try, the Mist of Yuelu Mountain Finally Came Out"
date: "2026-07-04"
summary: "Xiao Tang nodded on the ninth try, pushed the glass over. A grayish purple."
tags: ["Startup","Brand"]
category: "brand"
lang: "en"
---
Xiao Tang stood behind the bar, left hand shaking the tin, right hand wiping a glass. A July evening in Changsha, only two tables seated. The air conditioning was on, the warm yellow light above the bar falling on the back of his hand, the tendons jumping with each shake. I sat at the innermost seat, a glass of AiWan Breeze in front of me, vodka as the base, grapefruit and cranberry juice meeting in the glass, the rim faint pink.

This was Xiao Tang's fourth month at Puzi. He came after A-Jie left. The day A-Jie left for Shenzhen, I handed him the drink list for the City Inspiration Series, ten drinks, ten lines, each followed by a story of Changsha. He copied the recipes and asked, brother, what does the mist of Yuelu Mountain taste like. I said, climb it once and you will know. I had done brand work for ten years, and in that moment I found I could not answer either.

He went at six the next morning. A May morning on Yuelu Mountain has thin mist, the stone steps wet. That night he stood behind the bar testing. Vodka as base, creme de cassis poured in, the color turning grayish purple. He squeezed in pineapple juice, tasted, shook his head. The ninth version he finally nodded, pushed the glass toward me. I took a sip, that damp, grass-not-yet-cleared taste, it really was like that mountain in the early morning. That drink is called Yuelu Mountain.

Each of the ten signatures has its own origin. Peach Secret uses rum and milk, white peach syrup hidden inside, sweet first then astringent. Half-Drunk is brandy plus rum, lemon juice holding it down. Espresso Dream was A-Jie's last, vodka with coffee liqueur and espresso. Miss Tiffany is rum with coconut milk, blue curacao turning it pale blue. Blue Shanghai also uses blue curacao. Lao Zhou asked why a Changsha bar would name a drink after Shanghai. I said the Xiang River is blue too. Summer Lychee has no alcohol, just guava and lychee juice. Starfruit Garden piles tropical fruit together. Purple Haze is grape with rose syrup and Sprite, with rose on the palate after.

Xiao Tang spent a full week on AiWan Breeze. I told him to go sit at Aiwan Pavilion for an evening. He actually went. He came back and said, the wind is cool, but it does not feel cold on the skin. He remixed it, vodka as base, grapefruit, cranberry, peach syrup, the ratio changed five times. The last version he brought me, pale pink, the peach sweetness first, then a faint bitter tail of grapefruit. I said, this is it. He smiled, the first time he smiled in the shop.

Half fireworks, half poetry. That is the line I gave Puzi. The fireworks is the wok behind the bar. Siamese sour-spicy crispy chicken sizzles when it comes out. The moment mountain pepper beef jerky hits the table, mujiangzi oil fills the whole room. The poetry is hidden in the drinks. Peach Secret is the crush never spoken. AiWan Breeze is the wind that does not feel cold. I also built the concepts of Emotional Asylum and introvert-friendly bar, with names on the menu like Solo Happiness Combo and Don't Want to Talk Today.

It makes me sheepish to say it. These concepts are easier to talk about when the place is full. Puzi sits above Sam's Club in the Poly mall. The foot traffic downstairs is real, but those people are there to buy things. They push their carts out and leave. They do not come upstairs for a drink. On weeknights the bar often has two or three tables. Sometimes I wonder whether an Emotional Asylum still counts if nobody comes in.

Last month a guy came in alone, sat at the innermost seat, ordered Peach Secret, finished it, and ordered another. I asked if he was thinking of someone. He did not answer. When he paid he said, in college he liked a girl, never told her. I said this drink was mixed for that kind of person. He smiled and said he would come back. His second visit was three days later. He ordered Espresso Dream. The last sip was slow. I asked how his day was. He said, okay. Just one word.

Another guest came four days in a row, the same AiWan Breeze every time. On the fourth day he asked who named the drinks. I said, me. He said, nice. None of these people wandered in off the street. With all that foot traffic at Sam's downstairs, not one person came up for a drink because they happened to be passing by. They were drawn by something I cannot quite name. Maybe the line on the menu. Maybe the drink. The crowd is small, but each person who comes stays with the drink for a long time.

When Xiao Tang collected the glass I checked the time, eleven forty. The lights were still on. I sat there without moving, thinking about how the mist of Yuelu Mountain ended up in a glass, and the guy who drank Espresso Dream so slowly. Downstairs, Sam's had closed. The parking lot was empty. The warm light above the bar was still on, falling on Xiao Tang's hand as he wiped the glasses.

title: "The Air Conditioning in That Tsim Sha Tsui Meeting Room"
date: "2026-07-20"
summary: "A tower in Tsim Sha Tsui, AC on the back of my neck, Asia Miles across the table."
tags: ["Brand","Methodology"]
category: "brand"
lang: "en"
---
Summer 2017, a tower in Tsim Sha Tsui, Hong Kong, somewhere above the twentieth floor. The air conditioning was set low enough that I wanted a jacket. I sat at one end of a long table, and across from me sat the people from Asia Miles. Asia Miles, Cathay Pacific's mileage program, and that year we were negotiating a partnership with them for Zuzuche. The vent was blowing straight onto the back of my neck. I moved my cup to the side.

Two laptops on the table, mine and theirs. I opened the deck, got halfway through, and the woman with glasses across the table nodded and said, on this points-redemption entry, we can do it as the first platform partner of this kind. My palms were a little damp, but I kept that to myself. Beyond the glass wall of the meeting room was Victoria Harbour, boats crawling slowly across the water.

I had been at Zuzuche a few years by then, handling brand and partnerships. Zuzuche did overseas self-drive rentals, took people from China and put them into cars abroad, and had them drive foreign roads. Stripped down, it was moving people from one place to another, and the moving itself was the seam we had to fill. Asia Miles moved people from the ground to the sky, miles and points building a bridge in between. The two businesses looked far apart, but pulled apart to the bottom, both were about carrying a person from one scene into another.

The air kept blowing. I drank some water, it was cold.

2020, a different place, Guangzhou, TIT Creative Park. Yiche's Guangzhou office sat there. The park had a few coffee shops, and in the afternoons people wandered around holding cups. My desk was by the window, I could see a few trees in the green strip below.

I was building MO Card there, the car-owner membership system. Yiche had been in auto media and transactions for years, holding a huge amount of owner data, but these people were scattered across pages and apps, with nowhere unified for them to stand still. MO Card was meant to gather them, give them an identity that could hold its weight. Saying it out loud, it was the same thing as Zuzuche gathering people who wanted to drive overseas. Same person, walking from a car-browsing page to a membership card page, from researching where to drive to placing a rental order, crossing several thresholds in between.

I worked late a lot then. After nine the park was mostly empty, lights on in only a few buildings. I sat at my desk revising the deck, and outside the window I could hear the cleaning auntie mopping the floor. I broke MO Card's benefits down, then down again, to the smallest grain, then built them back up. Somewhere in that taking apart and putting back, a thing clarified for me: doing brand across industries, the things you can carry with you are few, and one of them is the ability to move a person from one scene into another.

2023. Nansha, Guangzhou. A farm, the kind they call an agricultural park. Penguin Exploration, the study-tour brand I later ran myself, and that day was the first event. Dozens of families signed up, more than I expected. The farm had a vegetable plot, bright green, and kids squatted in the dirt pulling radishes and picking greens, parents photographing them from the side. One small boy refused to stand up, his mother called him, he wouldn't come, his fist full of baby bok choy.

I stood at the edge of the plot and watched. The sun that afternoon wasn't too harsh, but squatting long enough made your legs numb. A mother walked over and asked me, can we take these vegetables home to eat. I said yes. She walked off carrying a bag of greens, her kid running behind her trying to catch up.

Study tour sounds like a big word, pulled apart it's just sending city kids to a field and bringing the field back home.

The cold air came back, I was sitting in that Tsim Sha Tsui meeting room again. The water in the cup had gone cold, the woman across from me closed her laptop and said, let's push this forward. I nodded. The air conditioning blew down from the vent overhead, onto the back of my neck.

title: "The Interviewer Asked If I Knew Cars"
date: "2026-07-12"
summary: "The interviewer asked if I knew cars. I said not really, but I can learn."
tags: ["Career","Methodology"]

June 2019, Guangzhou. I sat at the desk in my rented apartment, laptop open, my resume on the screen. The experience section was packed with tourism. Ping An Bank was there. Huaxia Bank was there. Hong Kong Airlines too, plus a promotional event for the South Australia Tourism Board. All clients I had handled doing business development at Zuzuche. The next day I was going to interview at Yiche, an automotive internet company, for a marketing role. Nowhere on that resume could you find a single word related to cars.

I highlighted the line “South Australia Tourism Board promotional event,” deleted it, hit undo, deleted it, hit undo. The cursor blinked on that line. Outside, someone downstairs was cooking. The smell of hot oil drifted up through the window. Delete those tourism clients and the resume would be mostly empty. Keep them and the interviewer would see immediately that I came from tourism. I edited until past midnight. In the end I kept a few lines, tucking the word “tourism” into the least conspicuous spots I could find.

The next day, the interview. The interviewer was in his thirties, black-framed glasses, a cup of coffee on his desk that he barely touched. He flipped through the resume a few times, looked up, and asked: “Have you ever worked in cars?” I said no. He followed up: “Then do you think you can do marketing for an automotive internet company?” My palms were a little damp, but my mouth kept going. I said I'd worked with rental car companies at Zuzuche, that people who rent cars and people who buy cars overlap in part of their decision-making path, that some of what I'd done could transfer over. He didn't respond. He wrote a few words on my resume. I had no idea what.

I got the offer. After I joined, I found out he'd told someone I “answered honestly, didn't make things up.”

In 2022, after seven months at Pacific Auto, I left to start Penguin Exploration. This time nobody interviewed me. I asked myself: have you ever done parent-child study programs? No. Have you ever built something from zero? Also no. I sat in the living room late into the night, a draft of a business plan spread on the coffee table, a cup of tea gone cold beside it. After all the asking, there was only one thing I could tell myself for certain: I knew how to find channels. Explaining an unfamiliar field clearly, I had practiced that. Getting rejected and keeping the conversation going with a thick skin, practiced that too. None of it had anything to do with parent-child study programs. Nothing to do with tourism or cars, either. But it all seemed usable wherever I went.

After moving back to Changsha, I was talking with a friend who ran a restaurant. He was leaning on the counter with a dishcloth over his shoulder, the kitchen closed, his last waiter already gone home. He wanted to switch industries. He asked me if crossing over is hard. I said industry knowledge you can pick up. What really gets you is sitting across from an interviewer, trying to make them believe your experience, all of it from outside their industry, is worth something. He said he didn't understand what I meant. I laughed. I said I couldn't really explain it either. Just that during that interview my palms sweated, and my mouth didn't stop.

That night I walked out of his shop. Not many people on the street. The streetlight stretched my shadow long. I reached the intersection and waited for the red light, hands in my pockets, and felt a crumpled receipt in one of them.

id: "silver-tourism"
title: "Wuyi Square Was Full of Young People"
date: "2026-06-24"
summary: "A casual chat at a teahouse uncovered a demand no one was serving."
tags: ["Travel","Insight"]
category: "insight"
lang: "en"
---
We were at a Sexy Tea shop near Wuyi Square in Changsha, my friend and I, sitting for almost two hours.

Last year we'd spent a couple of weeks looking into Changsha's K-12 study tour and wellness market together , visiting places, talking to people. The track turned out to be harder than expected. But that day, mid-conversation, he suddenly said: "Why does it seem like no one is seriously working on bringing elderly travelers from other cities to Changsha?"

I paused, cup in hand. He'd been running local businesses in Changsha; he knew this market better than I did. I asked him why not try custom small-group tours for out-of-town seniors. He paused too:

> "Never thought about it. Aren't people coming to Changsha mostly young folks? Drinking Sexy Tea, eating chili fried pork, taking photos?"

That reaction itself was telling. Two people who'd studied Changsha's local service market had never once considered this angle.

When I got home, I pulled some numbers. China's population over 60 has already surpassed 280 million. Changsha's silver economy is currently around 80 billion yuan. During the 2025 Spring Festival, Changsha received 9.49 million visitors , nearly three in ten were over 50. Tongcheng Travel's data is even more direct: per-capita accommodation spending for users over 60 is more than 30% higher than younger groups. In the custom tour segment, seniors spend over 12,000 yuan per trip on average.

In other words, it's not that seniors won't spend money. They won't spend it on products that don't fit.

But scroll through any OTA platform and you'll barely find a single Changsha itinerary designed for seniors. It's all the young-people version: check in, snap photos, power through. Most "senior group tours" are still the same formula , bus shuttle, landmark photo stop, group meal, shopping stop. One survey I read said over 70% of senior travelers feel existing products are more "rushing through sights" than actually seeing anything. For young people, that's a packed itinerary. For seniors, it's an ordeal.

Last month I made a trip to Dongmao Street Teahouse. It's a 1952 assembly hall converted into a teahouse , 2 yuan scallion rice cakes, 5 yuan peanuts and sunflower seeds, 8 yuan unlimited tea refills. Seniors already make up 40% of the clientele. I sat in a corner and watched for an afternoon. Most of the regulars were locals, but every now and then I'd catch an out-of-town accent. A retired teacher from Wuhan sat by the window, ordered a pot of tea, and spent the whole afternoon reading Changsha Evening News. He told me he travels twice a year since retiring, and regrets booking a tour group every single time. "The last one , four hours on a bus. Got there, took photos, left."

He said it flatly, like he was describing something he'd long since accepted.

Changsha actually has plenty that suits older travelers. Mawangdui, Yuelu Academy, Tongguan Kiln , young people might snap a photo and move on, but seniors will stand there and look for a long time. Ningxiang Huitang Hot Springs and Malin Hot Springs are positioning on wellness. Seven locations including the Zhang Zhongjing Cultural Park and Jiuzhitang TCM Museum are already on Hunan's first batch of premium TCM wellness travel routes. Transport is easy too , high-speed rail and flights connect to all major cities, ideal for a three-to-five-day trip.

Policy and infrastructure are both moving in this direction. All 34 of the city's 4A-level and above scenic spots have completed accessibility renovations. Yuelu Mountain's cable car upgrade pushed the senior visitor share to 30%. This year, silver tourist trains started running into Changsha , 67 of them in Hunan so far, serving over 50,000 senior travelers. If someone could handle the "last mile" after the train arrives , pickup, lodging, custom itinerary, drop-off , that's a complete loop.

But genuinely senior-savvy custom products are still scarce. The question my friend asked me that day at Sexy Tea points to something concrete: Where do the customers come from? How do you price it? How do you earn their trust?

On acquisition , OTA platforms don't reach older users well. Offline travel agencies, community channels, senior university networks, referrals from adult children , those might work better. On pricing, I wasn't sure at first. A small custom group costs more than a bus tour, obviously. But do seniors really mind? I dug into the numbers: over 60% of retirees have an annual travel budget above 5,000 yuan, and plenty spend over 12,000 on a single custom tour. It's not that they can't afford it. It's that they need to feel it was worth it.

Trust might be the hardest part. The senior travel market has been burned too many times by low-price traps and forced-shopping tours. The moment some seniors hear "travel agency," their guard goes up. The 2026 national standard , Travel Agency Service Requirements for Elderly Tourists , sets specific guidelines on itinerary design, shopping, and safety. But standards alone aren't enough. Someone has to actually follow them.

When we left the teahouse, it was already dark. Wuyi Square was still packed, all young faces. I stood by the road waiting for a car, thinking about what the retired teacher from Wuhan had said.

He'd added my WeChat before leaving. Last week he sent me a message , said he wants to bring his wife back to Changsha in September, asked if I could help arrange it. He said no rush, take it slow.

I wrote back: okay.

title: "You Said You Wanted to Build Something"
date: "2026-07-08"
summary: "Flora spat clam shells on the table. Worst case, she said, burn the money with nothing to show."
tags: ["Career","Startup"]

One afternoon in October 2022, I sat at my desk at Pacific Auto writing a resignation letter. I wrote slowly. Deleted, revised, deleted again. The office air conditioning hummed. A colleague at the next desk was on a phone call, voice kept low. I typed a subject line, deleted it, and in the end just wrote one sentence: “I am resigning for personal reasons,” followed by the date. The cursor hovered over the send button for about a minute. When I clicked, my palms weren't sweating. Just a tightness in my stomach.

It started two nights before. Flora had asked me to dinner at a dai pai dong in Tianhe. She said she wanted to start a parent-child study program and asked if I was in. Flora was a friend I'd known for a few years. She worked in education and had always wanted to go out on her own. On the table: a plate of stir-fried clams, two bottles of beer, and a pile of shrimp shells left by the previous customers, still uncleared. Flora spat clam shells onto the table while talking me through the numbers. How much it would cost to start from zero. What the worst case looked like. I listened, poking at the rice in my bowl with my chopsticks. The light bulb wasn't bright enough. It made her face look yellow, a bit of clam juice at the corner of her mouth.

I said things were fine for me at the big company. She said sure, things are fine, but you told me last time you wanted to build something of your own. I thought about it. I had probably said that, some night when I was working late, complaining.

The next morning at work, I sat at my desk at Pacific Auto staring at the 52% number on the dashboard. I had spent seven months pulling it up from 0.5%. When it got there I didn't feel happy. Just tired. In the afternoon there were two meetings. Someone said the next goal was to push activity to 70%. I sat in the conference room listening, and suddenly I couldn't muster any interest in dragging a number from 52 to 70. What Flora had talked about last night, starting from zero, kept turning over in my head.

After the meetings I went back to my desk, opened my email, and started writing the resignation letter. While writing, I thought about the plate of clams at the dai pai dong, the juice at the corner of Flora's mouth, the way she tapped her chopsticks on the table when she was doing the math. She had said the worst case was burning through the money and having nothing to show for it. “But at least you tried.” I remembered that clearly.

After I sent the letter, I went to find my direct manager. He was in his office, a cup of tea gone cold on the desk. He read the email, looked up at me for a moment, and asked if I'd thought it through. I said I had. He said I was doing well at Pacific Auto, the numbers were right there. I said I knew. He didn't push. “Good luck, then.”

I walked out of his office and stood in the hallway. The hallway lights were white, a little harsh on the walls. I pulled out my phone and sent Flora a message: “I quit.” She replied instantly with one word: “Do it.” Then she sent a location pin, an office space she'd been looking at, in Panyu, Guangzhou. I tapped the pin. On the map it was a grey building with nothing around it.

id: "status-anxiety"
title: "Past Two in the Morning, Scrolling My Feed for Too Long"
date: "2026-04-17"
summary: "The night I lost sleep over a nine-grid Plog, I realized I was waiting for a reply to prove I counted."
tags: ["Reading","Insight"]
category: "insight"
lang: "en"
---
2:17 a.m. I remember clearly, because I glanced at the top-right corner of the screen before I put the phone down.

It was a Friday. I was in bed scrolling through my feed and landed on a very ordinary post. Nothing special, just someone's daily Plog. Nine-grid, with a song attached. But I caught myself staring at it for a long time. Too long. My finger rested on the screen, not swiping down.

What was I looking at? What was I trying to dig out of it?

I put the phone face-down on the nightstand and stared at the ceiling. The air conditioner hummed. A thought surfaced, and when it did, I startled myself: does my existence mean anything?

Ridiculous. I know. Losing sleep over a nine-grid Plog at 2 a.m. In the past I would've called myself melodramatic and rolled over and slept. But that night I didn't roll over.

Because it wasn't the first time.

I used to think jealousy was a character flaw. The kind of thing you should hide, not really admit to. Then I read Status Anxiety and slowly realized jealousy is actually a signal. When I was jealous of someone, it wasn't that they were really that great. It was that I'd automatically cast them as a judge. Whatever they had that I didn't meant I wasn't good enough.

Scrolling through feeds at 2 a.m. is the same thing as jealousy. When you're jealous, you stare at what someone else has. When you're scrolling late at night, you stare at the signals someone else sends out. Both are waiting for a response, one that proves you "count."

The next morning, the thought was still there.

I sat on the edge of the bed and zoned out for a while. The light outside had already turned white. My phone buzzed. The delivery had arrived. I'd ordered a bowl of noodle soup during my insomnia the night before, scheduled for 7:30 a.m. The delivery guy rang the doorbell three times before I went down to get it.

While eating the youtiao I kept thinking: why does a slow reply feel like waiting for a verdict? Why does silence make me start wondering if I'm not important enough? Even with the person I'd had the deepest connection with, I'd fall into the same trap. Turning over the silences and the unsaid things, wearing myself down.

Around that time I happened to be reading Status Anxiety. Someone had asked what I was reading, and I'd snapped a photo of the cover and sent it over. I didn't expect that months later, I'd finish the book with a head full of tangled thoughts. The book sat on the nightstand, next to my phone, my glasses, a half-glass of overnight water. The words on anxiety hit me all at once, and behind them were all the blank spaces left after our conversations, the things never quite said.

There's a passage in the book:

> A worry, so pernicious as to be capable of ruining extended stretches of our lives, that we are in danger of failing to conform to the ideals of success laid down by our society and that we may as a result be stripped of dignity and respect.

I read it twice. Then a third time.

The soup had gone cold. I finished the remaining half. Cold soup has a slightly chalky taste.

During that period I figured something out. My late-night scrolling had nothing to do with anyone else. It was my own thing. The fear of not being chosen. The sense that my existence wasn't enough to make someone stay. Even after that person's chapter had closed, even as a new one was starting, that feeling wouldn't leave.

Alain de Botton calls it "status anxiety." The desire to be seen, to be respected, to be loved. Not by everyone. By the people who matter to you.

Once I was on a video call with my mom. She asked how I'd been. I said fine. She said I didn't look great, asked if I'd been sleeping enough. I said yeah, just been busy lately. She looked at me for a moment, didn't say anything. Then she said, "I sent you the cured meat we made. Remember to pick it up."

After I hung up, I realized I do the same thing with my mom. When she said "you don't look great," I was waiting for her to say "don't push yourself too hard." She didn't, so I started turning it over: was I not showing enough exhaustion, so she didn't take it seriously? You see, even with my mom, I was waiting for a response to prove I was cared about.

Later, I slowly came to understand: success is a target that moves on its own. That's how society is designed, keep you running, chasing, consuming. You reach one, and the next one appears immediately. Endless.

Our generation is funny. Repeatedly told "you were born equal," yet more likely than anyone to feel we're not good enough. Because we compare our behind-the-scenes to everyone else's polished trailer. Our unfiltered daily life against the soft-focus warmth of an ex's memories, against the ambiguous signals of a new relationship.

But what the book really left me with is one word: perspective.

The people who love you don't love your carefully formatted profile page. They love things you'd never put in a bio. The messy thoughts you have at midnight. The silence that doesn't need explaining. The version of you that was "already enough."

Last weekend I went to the supermarket. At checkout, the guy in front of me was old, buying two bags of rice, a bundle of scallions, a carton of eggs. He took out his phone to scan the code, tried three times, didn't work. The cashier girl was patient, helped him pull up the payment code, held his phone up to the scanner for him. The old man kept muttering "thank you, young lady, I'm not very good at this." She smiled and said "no problem, Grandpa, I'll help you next time you come too."

I stood behind them and watched for a while. When the old man walked out of the supermarket, his steps were slow, but steady.

Walking home with my own bag, the sun was just right. A kid on the sidewalk was riding a hoverboard, fell, got back up, kept riding.

I suddenly thought: I've been running a race. A race where I had to be seen, chosen, remembered. But I never actually signed up. That finish line I thought proved I had value if someone paid attention to me, every time I got close, it moved further away.

Maybe the point was never to win.

That night I didn't scroll my feed. I got sleepy around nine, turned off the light, slept. Woke up once in the middle of the night, reached for my phone to check the time, 3:04. Didn't open a single app. Went back to sleep.

The next morning I was woken by the garbage truck downstairs. 6:40. A sliver of light came through the curtain gap, landing right on Status Anxiety on the nightstand. The book was still open to that page, with a corner folded.

I got up, poured myself a glass of water, stood by the window drinking it. The old man from yesterday was out buying groceries again, carrying the same cloth bag.

I thought, maybe next time I'm lying awake in the middle of the night, I'll still spiral into all those thoughts. But at least I know: the sky always gets light. Someone will go buy groceries downstairs, the garbage truck will come, the noodle shop opens at 6:30.

That's enough.

title: "The Afternoon Someone Yawned Across the Table"
date: "2026-07-16"
summary: "Page eight of the deck, the person across yawned, not looking at me, looking out the window."
tags: ["Study Tour","Insight"]
category: "insight"

---
Winter 2023, Panyu, Guangzhou, a bidding room for a government project. The meeting room wasn't big, a round table, a few chairs, a whiteboard on the wall still marked with words from some other meeting that morning, nobody had wiped it. I sat on one side of the table, across from me sat a few representatives from the client side, and one of them, a middle-aged man, listened for a while and yawned without covering his mouth.

I held a deck in my hand, A4 paper, twenty-some pages. I was on page eight when he yawned. I stopped for two seconds, looked at him, he wasn't looking at me, he was looking out the window. Guangzhou was hot that day, the air conditioning was on in the room but it didn't reach my side, the small of my back was damp.

The study-tour trade had been grinding hard since 2022. I ran Penguin Exploration, and the first event was in 2023, out in Nansha, Guangzhou, on a farm, the kind they call an agricultural park. Dozens of families came that day, the farm had a vegetable plot, the kids squatted in the dirt picking greens, one small boy refused to stand up, fist full of bok choy he wanted to take home and eat. I stood at the edge of the plot watching, the sun wasn't too harsh, but squatting long enough made your legs go numb. After that event I thought this could work, the parents wanted to come, the kids wanted to squat down.

It didn't last.

The price comparisons in the parent groups got ruthless. One itinerary, five agencies quoting five prices, and parents would hash out a gap of a few dozen yuan for an entire afternoon. Someone stitched the five itineraries into a single image and dropped it in the group, comparing item by item, what time the meetup, what time the meal, whether insurance was included, what time the kids got dropped back. The parents compared it finer than procurement.

Route homogenization pushed in too. Of the outfits doing study tours in Guangzhou, four out of five ran the same intangible-heritage route, the same inheritor, the same workshop, and the handmade things the kids brought home were all the same. I went around and looked that year, came back and sat a long time at my desk in the co-working space, said nothing. The person at the desk across from me asked what was wrong. I said nothing, just thinking about how to be different from the rest.

Spring 2024, the event at the HKUST Guangzhou campus was an exception. I designed a route tied to campus research, walking the kids through the corridor outside a lab, letting them watch what the grad students were doing. That one hit a 60% conversion rate, with 40% organic traffic growth. But that was ground out event by event, and the whole time I was grinding it out, my palms were sweating.

The middle-aged man who yawned at the bidding that day ended up picking another agency. Their price was lower than mine, the route about the same. When I walked out of the meeting room, the sound-controlled light in the corridor came on, then went off. I stood there waiting for it to come on again, it didn't. I stamped my foot, it came on.

Juan, the word people use for the grind, put plainly it's everyone squeezing into the same spot. To break out of it you have to find the piece of ground nobody has squatted on yet. That kid at the farm down south, clutching his greens and refusing to leave, I remembered that moment a long time. Parents will pay for that instant of squatting down, they won't pay for an itinerary that looks like everyone else's.

Back home I opened an old file folder, the photo on the cover was the 2023 farm event, a few kids squatting in the field, backs to the camera, hands full of vegetables. Outside the window it had gone dark, the sound-controlled light in the hallway came on, then went off.
