Guangzhou, June. The office air conditioning wasn't doing its job. Sweat pasted my shirt to the back of the chair. On the desk I had a sheet of A4 paper with twenty-some names written in ballpoint, phone numbers beside them. Some names had check marks, some had crosses, most had nothing at all. I had just finished a call. The person on the other end heard “Hi, I'm from Zuzuche” and hung up. Third person to hang up on me that day.

That was 2016. I had just joined Zuzuche doing business development. Before that I had never made a cold call. The first few times my palms sweated, I'd get stuck mid-sentence, and when they asked “Who is this?” I almost couldn't answer. Eventually I found the rhythm. They hang up, you call back. Can't meet this week? Try a different hour. When someone finally says come over, you go sit in their office. There was one rental car boss who said “no time” three times on the phone. The fourth time I called at a different hour, he said “alright, come over.” I sat in his office the whole afternoon. We talked about his business, barely touched our product. When I left he said “add my WeChat.” Opening my mouth took about three years to learn.

In 2019 I went to Yiche, working in that building in Guangzhou's TIT Creative Park. My desk faced the window. In the afternoons the sun came in at an angle and glared off the screen, so I kept shifting my chair to the left. We were building the MO Card, a car owner membership system. When I first took it on, things were tangled. What the partners wanted didn't line up with the product logic, and operations was running on its own rhythm. Everything knotted together. My daily work was pulling those threads out one by one and connecting them where they needed to go. One afternoon I sat through four meetings back to back. By the time the last one ended, it was already dark. I sat at my desk, took a photo of the flow chart on the whiteboard, and sent it to a colleague with the caption “finally got this thing to look like something today.” Gathering scattered things takes patience, and knowing which thread connects where.

March 2022, I joined Pacific Auto as senior business operations manager. There was a number that looked bad when I walked in. User activity rate: 0.5%. I sat in the conference room with the projection on the wall, that number like a white stain. My boss said get it to a respectable number within seven months. I didn't say anything, went back to my desk and spent two days digging through the backend. What came after wasn't complicated to describe. Tweak a rule, push a campaign, find the data hasn't moved and go back looking for the problem. For seven months I rarely left before ten at night. In October the activity rate hit 52%. I stared at the backend dashboard for a long time. Didn't feel happy. Just tired.

That same October I left Pacific Auto and started Penguin Exploration with a partner. No office, so we worked out of my living room, the coffee table buried under laptops and takeout boxes. Clients we had to find ourselves, and we didn't even have the shadow of a real product yet. The first client took six or seven visits to sign. The night we signed, I sat in the living room for a long time. Outside, the Guangzhou skyline lit up patch by patch. Building something from zero, the hardest part is the very beginning, when you don't know if what you're building is something anyone wants.

In 2025 I moved back to Changsha. Days I go to work. Some nights I go to the bar. The bar is called Puzi, started with a partner whose family name is Zhou. One night I stood behind the bar counter watching a customer order a drink, take two sips, set it down, say something to his friend. Both of them laughed. It hit me that in ten years of doing this, I'd been learning how to make things and push them out. What I've been slowly picking up since coming back to Changsha is something else: stopping to see whether the thing you made is something anyone actually uses. The light behind the counter was warm yellow, falling on that glass with two sips taken from it.

The first time I hosted a Penguin Explore study-tour session, it was at a community activity center in Nansha, Guangzhou.

Twenty-something kids running around, parents standing by scrolling their phones. When it was over, one mom asked me: will you have another one? I said yes. She said "oh," and left. Didn't add my WeChat, didn't leave a number.

I stood at the entrance of the activity center and watched parents leaving with their kids one by one. The room emptied. The lights were still on. The session hadn't been bad, the kids had fun, the mentors were serious. But it had nothing to do with the words "Penguin Explore."

The team was already working on the brand and study-tour products, but the products weren't connected to each other. Users came to one session and left without a trace. The problem in front of me was concrete: how do you make the activity itself part of the brand?

The first thing we did was stop treating each session as a one-off and start treating it as a product. Each session belonged to a themed series, Nature Exploration, City Walks, Tech Innovation, and each series had its own visual style, naming convention, and narrative arc. A kid who came once and had fun would recognize the style the second time, and recommend it to a friend the third.

By the fifth session, we'd set up a "brand wall" on-site, a visual display of Penguin Explore's philosophy and system, something parents naturally looked at while waiting. After each session, every family received an "exploration report", photos of their kid, what they brought home, a teaser for the next session.

Mentors also passed on the brand philosophy during the session, not as a script, but through stories and interaction. There was a mentor named Xiao Lin. During a Nature Exploration session, the kids were picking up leaves. One kid asked him: why are we picking up leaves? Xiao Lin said: because every leaf is different, just like every one of you. Later, that kid's mom posted the exchange on her feed, with photos from the session and the brand hashtag.

Single-session conversion eventually reached sixty percent. Not because the sales pitch was good, because conversion happened inside the experience, not after it. By the time users left, they'd already built trust with the brand.

We also designed a lightweight referral mechanism: share session photos to your feed with the brand hashtag, or invite a friend to the next session, both sides get a small gift the kid would like. After each session, we'd spend fifteen minutes debriefing: which designs made people want to share, which moments didn't land.

The night the twentieth session ended, I was sitting on the steps outside the activity center, sorting materials. A kid who'd been to a previous session came over holding his mom's hand, pointed at the penguin logo on my shirt, and said: "Mom, that's the penguin."

His mom smiled and added my WeChat.

id: "visual-upgrade"
title: "Up Close, That Penguin Had a Human Face"
date: "2026-06-21"
summary: "Two hours of arguing in a design review. Then I pointed at a penguin with a human face."
tags: ["Brand","Design"]
category: "brand"
lang: "en"
---
When I joined Penguin Explore in late 2022, the study-tour brand had already been running for a while. But the visual system was a mess, the logo was a hand-drawn penguin holding a magnifying glass, the color palette had half a dozen variants, and the typography changed with every version.

If we couldn't even explain our own visual style to ourselves, no wonder users couldn't either. I took one look at that logo and thought: this needs a redo.

But the first thing I did wasn't to brief a designer. I went back to twenty parents and asked them all the same question: Why did you choose us?

Three phrases kept coming back: "reliable service," "attentive mentors," "my kid likes it." That was the direction for the visual upgrade, not pretty, but making parents feel those three things at a glance.

The design review took two hours. The meeting room got loud.

The designer brought three options. The first was a cartoon penguin, round, cute. Some of the team liked it; others thought it was too childish. The second was minimalist linework, sophisticated, sure, but it had nothing to do with "study tours." The third option, the designer wasn't sure about it himself, so he put it last.

Up close, the left contour of that penguin was a human face.

The room went quiet for a few seconds. Someone said "that's interesting." Someone else said "is it too complicated?" I stared at that option for a long time. Then I pointed at it and said: this one.

The reasoning was actually simple. A study-tour brand needs to feel exploratory and approachable at the same time. A cartoon penguin would be childish; a minimalist one would be cold. But a symbol with a story, a penguin from far away, a human face up close, that carries two layers. The penguin stands for expertise and warmth. The human face stands for people at the center. The eye as the focal point: seeing, exploring.

For parents: deep blue and white. Blue for professionalism and safety, white for possibility, black as the accent, visual tension. For kids: we hid little easter eggs throughout the visual materials, penguin footprints, map elements, magnifying glass details, hinting at "a world you can explore."

The whole process took three weeks. New visual system, all materials updated, new brand video shot.

Sometime after it launched, I was scrolling through my feed and saw a photo from an event. It was a background wall, shot through a crowd, compressed by a phone screen, the logo was already a bit blurry. But someone in the comments asked: is this a Penguin Explore event?

I screenshotted it and sent it to the designer. He replied with an emoji.

A clear symbol doesn't need a slogan to explain it. Changing a logo isn't hard. What's hard is getting someone recognizable to live inside that symbol.
